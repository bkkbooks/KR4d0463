body:
  text: 雲峯集卷三元胡炳文撰序周易本義通釋序宇宙間皆自然之易易皆自然之天天不能畫假伏羲以畫天不能言假文王周孔以言然則羲文周孔之畫之言皆天也易言於象數而天者具焉易作於卜筮而天者寓焉善乎子朱子之言曰伏羲易自是伏羲易文王周公易自是文王周公易孔子易自是孔子易烏乎此其所以為羲文周孔之天也必欲比而同之非天也易解凡幾百家支離文義者無足道附㑹取象者尤失之蓋凡可見者皆謂之象其或巧或拙或密或踈皆天也易之取象壹是巧且密焉非天矣惟邵子於先天而明其畫程子於後天而演其辭朱子本義又合邵程而一之是於羲文周孔之易㑹其天者也學必有統道必有傳遡其傳羲文周孔之易非朱子不能明要其綂凡諸家解易非本義不能一然其統其傳非人之所能為也亦天也予此書融諸家之格言釋本義之奥旨後之學者或由是而有得於本義則亦将有得於羲文周孔之天矣延祐丙辰春新安後學胡炳文仲虎父序四書通序四書通何為而作也懼夫讀者得其辭未通其意也六經天地也四書行天之日月也子朱子平生精力之所萃而堯舜禹湯文武周孔顔曽思孟之心之所寄也其書推之極天地萬物之奥而本之皆彛倫日用之懿也合之盡於至大而析之極於至細也言若至近而涵至永之味事皆至實而該至妙之理學者非曲暢而旁通之未易謂之知味也非用力之乆而一旦豁然貫通焉未易謂之窮理也予老矣潜心於此者餘五十年謂之通矣乎未也獨惜乎䟽其下者或泛或舛將使學者何以决擇於取舎之際也嗚呼此予所以不得不㑹其同而辨其異也㑹之庶不失其宗辨之庶不惑於似也予不敢自謂能通子朱子之意後之通者儻恕其僭而正其所未是則予之所深冀也泰定甲子九月旦日新安後學胡炳文序感興詩通序夫子讀周公尹吉甫之詩皆讃之曰為此詩者其知道乎以其詩有關於天理民彛有關於世變也子朱子感興詩兼之矣明道統斥異端正人心黜末學六百三十字中凡天地萬物之理聖賢萬古之心古今萬事之變關焉使擊壌翁早得見之安得謂刪後果無詩哉始言一理中散為萬事末復合為一理與中庸合朱子分中庸作五節詩凡五起伏亦無有不合者獨恐後之註其詩者未必皆能如朱子之註中庸耳然由此十家之註以㑹朱子之意則亦未必不為行逺升高之一助云㤗定甲子十月望日新安後學胡炳文序四書通證序北方杜緱山有語孟旁通平水薛夀之有四書引證皆失之太繁且其中各有未完處觀者病焉今友人張徳庸精加讎校刪冗而從簡去非而從是又能完其所未完者合而名之曰四書通證以附予通之後學者於予之通知四書用意之深於通證知四書用事之審德庸此書誠有補云泰定戊辰正月壬辰雲峯老人胡炳文序程草庭學藳序魯論曰不學詩無以言父所以詔其子也又曰小子何莫學夫詩師所以詔其徒也是何孔門拳拳詩學如此哉盖平其心以排遣其凝滯和其氣以消釋其鄙暴攻温柔敦厚之敎而觸其易直子諒之天是詩學者能之謌詠之嗟嘆之機動籟鳴手舞足蹈悠然躍然有不知其所以然者變化氣質涵飬德性思無邪之功居多姑即魯論一書推之學乎切磋琢磨之詩則貧樂冨禮之理得矣學乎倩盼素絢之詩則繪事後素之理得矣學乎唐棣之詩則近思之理得矣學乎白圭之詩則謹言之理得矣以之興觀羣怨而至于事父事君而至于移風易俗而至于動天地感鬼神皆學詩之能事也虞廷上以教胄子下以化苗頑皆取諸詩是詩學者君父師所以為敎者歟異哉後世之學詩者工句法求字面較聲韻之逆順商偶對之巧拙大抵章句學而已矣繪畫煙霞雕琢泉石𤨏𤨏乎為虫魚草木寫真所謂詩者殆與琴棋書畫等為一藝豈復有吟風弄月吾與㸃也意思孔門學詩端豈若是哉掉頭撚髭曰將效高古於曹劉也筆於其手縱迫曹劉何補於格致誠正雕肝琢腎曰將效俊逸於謝鮑也舉於其口縱迫謝鮑何補於修齊治平借使老語迫唐高辭嫓選以政則不能逹以使則不能對其猶正牆面而立也與孔門學詩端豈若是哉勤苦其心思巧好其言語平時矻矻讀書止資於詩而性分内事邈不相干孔門學詩端豈若是哉嗚呼孔門學詩致中和也理性情也後世學詩藝焉而已矣白樂天劉禹錫下至李益崔顥皆負詩名於唐者長恨一歌䙝語誨滛豈可興可觀者看花二絶召閙取謗豈可羣可怨者顥娶妻惟擇美者俄復棄之益防妻過嚴人謂之妬彼謂周南召南為何事五言初李陵豈不學者而無以救叛漢降番之失八病詳沈約豈不學者而無以掩叛齊歸梁之罪彼謂遠之事君為何事蓋後世以詩為學者惟章句之末心雖錦口雖繡而身不免為狼疾人吾固斷然謂流於一藝也孔門學詩端豈若是哉草庭博聞強記用昌其詩取所作題曰學藳所謂有味於道學諸儒之詩不唐不選未害也予不知所謂學者抑後世詩學乎抑孔門詩學乎閱其自序與諸公所為序於程子鞕辟着已皆引而不發故覼縷言之且以自警云診脉樞機序素問難經各八十一篇孰為要脉有七表八裏九道行於十二經絡孰為要浮沉遲數四字為要此名醫黄君存誠之說也予深然之蓋人心之病不一而意必固我論語指其要有四人言之病不一而詖淫邪遁孟子亦指其要有四易惟復曰无疾陽生於内也又曰无妄之疾曰有疾不可疾貞凡言疾者四其外專言疾者亦四豫損疾在隂爻鼎兌疾在陽爻脉浮數屬陽沉遲屬隂黄君之說正與論孟合與易合又與皇極經世書合其書分元㑹運世皆以四數起日月星辰天之四水火土石地之四寒暑晝夜性情形體雨風露雷走飛草木無非四也人分四體病分四季脉之病以浮沉遲數四字約之謂之不得其要可乎况經世書以易詩書春秋為四府易四象書四代詩四始春秋四時凡學者皆不可不知而况於醫予深然其說故為之序送文公五世孫序夫子六經生物之天地也文公四書行天地之日月也歙婺源魯洙泗之邦也初唐天祐中陶雅為歙州刺史命制置茶院府君領兵三千人戍婺源因家焉於文公為九世祖墓在連桐茶院以次墓在諸鄉凡六所在城韋齋井公嘗云聞先君子太史公生此地時井有氣如白虹經日不絶公以紹興庚午淳熈丙申歸省墓自是凡與族人書拳拳以守護為囑水木本源之思盖無食息不在念也至治癸亥秋公之曽孫晉臣率其姪友桂暨諸孫文明文鑑文德來歸如公淳熈故事顧瞻徘徊淚下如雨凡為他人所有者必欲復之廼已友桂文德復不辭五嶺之險控告于府壯哉此志可無愧為公之孫矣予嘗讀公之祭文有曰封塋所寄奉守弗䖍他人有之莫克伸理兹用震怛籲于有司鄉評亦公遂復如舊嗚呼此公告于連桐府君之墓之文也今公之孫可復以是告于連桐以次諸墓否乎可復以是告於公否乎予嘗泛觀自古暨今人家疇無邱墓其間豈無巢翡翠卧麒麟者然子孫能樹立表見於世行道之人必指異之曰此某人故宅也至有過喬木而式望松楸而拜者無他秉彛好德之良心也况庚戌聖賢之生其徳與天地日月無窮者哉孔林在洙泗歴代欽崇即其宅為廟凡孔氏墓官為守禁甚嚴方今文公之學行乎海之内外凡舟車所至人力所通無有不崇之者况去公僅餘百年遺風流俗兹猶有存而未泯者乎秉彛好徳凡有人心者同然况為公故鄉之人乎天地覆載日月照臨水木本源斯文乎在予因公之孫之來也不無深感焉亦不無深望焉故鄉之士皆為詩以嘉其志而其姪孫光復請予為之序大學釋㫖序予沉濳讀四書六十年近為纂䟽集成有訛舛處不得已為通一編友朋得之則以鋟之梓予悔之早程仲文舊從予㳺予以其嗜學極愛之今所著大學釋旨辭簡嚴密圗明該貫視章句有所發揮於予通有所傳授識者表章之薦剡交飛將以上聞仲文年方壯學方進未已此書之出視予得無又早乎雖然知人易受知難自知尤難大學誠意章言自知之眞也仲文其益務自知庶不負識者之知乎仲文勉之雖然予年八十亦不敢不自勉也至順庚午三月既望雲峯老人胡炳文序贈醫者程敏齋序儒不醫非通儒醫不儒非良醫夫既謂之儒未論物格知至一身中十二經十五絡自懵然莫之知病臥於牀委之庸醫比之不慈不孝此儒而不醫之通患也醫而不儒其患尤甚素問難經猶吾儒孔孟或有至老未能習者脉有三部九候七表八裏九道十怪凡男女皆然禇氏遺書謂男女脉三部皆相反胡為與王叔和不同五臟六腑應天五運六氣然六氣中胡為有兩火身穴三百六十五以應一歲然足陽明胡為有隂市足太陽胡為有至隂若是者悉未之考悵悵然欲以岐黄之術鳴於時吾不知其可也易曰無妄之藥不可試也試之一字夫子已逆燭天下後世為醫者之弊矣而吾鄉程君雲岩則不然其先世嘗從學于程夫子之門儒學所漸宏矣逺矣夫醫不過儒道中之一事物格知至此不過格中之一物雲岩以其先世儒學來而為醫其能十全取也固宜敏齋繼志述事恂恂篤實博極羣書所全活甚衆不酬亦不願且牓其門曰貧無力者與診脉施藥噫吾前所謂儒而醫通儒也雲岩翁有焉所謂醫而儒名醫也敏齋其有焉予以為世之為醫者不能皆如是也故表而出之送李生詩序繇祁之孚溪抵婺源餘二百里途多嶺平鼻尤險絶李生孟善不憚登陟問學明經凡射於百歩之外者有志必中孟善有志矣臨行有詩别其父父子相為唱酬丁寜訓飭之意溢于言外置之戒子通可也予每嘆世之為人子者盛意氣無詩書之志不可教為人父者矜勢利無道德之味不肯敎為人師者弗克邃於詩書而澤於道德者不能敎孟善父子如此又不憚逺從師教可立學當可成然學之成不在志氣大銳之日而在功夫有常之後六經言學自書說命始不能遜志失之亟不能時敏失之怠不亟不怠庶乎有常矣孟善之父字子常歸試以予言質之必以為然凡所得詩若干首衆屬予為之序晉卿山居圗序此圗晉卿間居所也予老矣於人家多見四五世晉卿又交之深者其大父梅趣翁為予丈人行父庭竹生後予兩月予為雌甲晉卿年未五十付家事其子觀書暇輙携孫花底婆娑自得其心予深知之居有溪先世創橋其上乆而圮晉卿新之述先志也鄉人題曰孝善瀦溪水字魚數百尾自題曰濠觀樂莊樂也蒔菊多異種題曰霜傑晚香自况也又有軒曰深峥古稱蓮與竹皆以君子竹比節蓮比德也環居皆山山最深處一室題曰内樂盖自梅趣翁以來家世皆樂善不倦西銘曰樂且不憂純乎孝者也晋卿之孝之善不徒在橋而在乎心此圖能寫其居之景不能寫其心予故為之序送知州范朝列序昔西山眞氏以廉仁公勤四字為官箴世道不古吏習益偷能踐斯言幾何人哉廼今於太守范公子誠見之公初以眞定儒選歴仕守台之黄巖毁淫祠摧豪富恤孤窮政聲甲江左為婺源未半月即以民病陳于府必得請然後歸門絶餽遺糴遵市估所食者繡溪之水而已民以是信公之廉均賦役而富室不得容其姦嚴信牌而走卒不得肆其毒兩造在庭諄諄開辟不趐父母於子豪奪歸疆强梁縮手六鄉無一呌囂隳突者民以是懐公之仁左右無私人人無敢干以私搜龍舟三十六為通濟橋小人無敢怨者民以是服公之公黎明視事或至日昊乃已不迫不苟事至立决庭無留訟民以是知公之勤常情立已於峻者羣怒之所歸今官無長貳咸欽其能得齊甿之心者莫諧巨室之意今民無富貧咸德其惠考績三載者或無可書今六七十日間而五萬人家已藹然有春意凡此皆廉仁公勤之效也淹之歲月所成就當何如昔鮮于侁在任司馬温公曰福星往矣安得百子駿布之天下哉予於范公子誠亦云感欽之餘不勝係戀筆之為序以送焉送醫士葉可翁序醫家八十一難經世所共宗讀難作去聲者非是番名醫葉可翁予雖未嘗面其人固已心識之婺源樂平鄰郡士大夫往還稱可翁不置口醫數難可翁皆能之夫醫嬰兒尤難昔鄭端友全嬰集吾鄉訥齋程公刋于泉司序之曰大學若保赤子心誠求之蓋以赤子不能自言非以至誠之心求之癢疴疾痛莫可致詰隂陽虚實翕忽變移豈非大難事翁兼大小方脉而用心皆出於至誠難也醫之中炙難鍼尤難必如允濟得之異人孕婦有腹偏左鍼左手指輙正有脫肛者鍼頂心輙愈有傷寒欬逆食不下鍼眼胔輙能食必如陳了翁得之天闕依夢中紅㸃鍼合浦病者無不竒中翁鍼法予未知其何所從受然聞淺深得宜全活甚衆又難也醫者不計貲發藥難不取貲施藥尤難山谷嘗題名醫之門曰能持隂隲以行醫不以人命而試藥吾鄉明遠江公自題其門曰務隂隲以行醫重人命而施藥夫不以人命試藥而施人以藥如江公者世所甚難而翁亦能之兹又難也凡此數難事視彼之規規於利以臆度之心投嘗試之劑者奚啻萬萬予安得不表而出之以為世勸然予患脚氣昔歐陽文忠子朱子皆病此朱子以鍼愈歐陽以吸氣自頂至踵愈不知翁能以是施之予否也然前所難者翁皆能之諒能愈吾此疾不難也故予既摭其難者公傳道之而末復致私請焉竹間詩序歙汪君孔昭邃於子平之學去年寓杭名卿士大夫咸敬之今年訪予山中所得竹間詩甚多俾予為之序詩皆詠竹不知竹正與其術相似種竹用辰日或用醉日尤良子平命以日干為主臘月種竹無不活以茂子平命以通月氣為上昔竹林七賢詠之者去其二山王以官累故也豈阮咸軰見官而不有官子平則見官傷官者歟且其所至凡術皆辟易不敢喘猶有竹之處衆禽不敢喧也山中留凡一月每與談清風襲人於其行也遂為竹間詩序俞氏新居靈芝詩序天厯戊辰永川俞君濟遠新居成芝生楹之東詩之者衆至順庚午始以示予予按本草芝有六色皆堅實芳馨叩之有聲又按漢舊儀芝有九莖金色緑葉木實夜視有光漢史所載齋房銅池之芝感以人而天應之者也豫章所記新昌之芝感以天而人應之者也其記之節文曰士將盡心於學則非常之物不虚其應予所望於俞君父子者亦如是人家有佳子弟㓜而聽其聲知其為英物長而挹其光知其為茂異此非堦庭間天然秀出之芝乎為子弟者又能孝弟以培其根以逹其枝以英英之人物為炳炳之勲業是芝也不特叩之有聲而能蜚英聲於當世不特夜有光而實邦家之光也九莖六色云乎哉况徳與氣相符人與天相應先知之祥又當層出而未已也予所望於俞君父子者豈少哉新詩視戊辰所得多佳者不少且太守穆如史公倡之予敢不為之序是年秋七月既望同郡炳文書送醫人胡芳崖序易復彖曰无疾豫六五曰貞疾无妄九五曰无妄之疾損六四曰損其疾兌九四曰介疾復之无疾一陽方生於下也餘言疾皆於外卦見之盖陽在内則无疾凡疾皆有感於外者也凡言疾者四有喜者三不死者一聖人好生之心可見至曰无妄之藥不可試也試之一字其灼見後世為醫者之深患乎黄山谷題孫氏藥室云常持隂隲以行醫不以人命而試藥醫之能如孫氏幾何人哉嚴溪胡氏世醫芳崖廉儒故其藝益進且持心甚平易診人脉十數年休咎能預知之富春有吳子賢者病頭痛日數發發輙以帛係其頭命左右極力拽之乃小定衆醫以傷寒治弗效芳崖曰此腎厥也衆醫皆笑芳崖進蔥涎圓立愈他類是不一予苦脚疾服其藥不兩日亦輙愈予以是深知其人非以嗜利之心而行其嘗試之藥者故為序送之雲峯集卷三
