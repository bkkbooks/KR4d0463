body:
  text: 雲峯集卷六元胡炳文撰上梁文明經書院大成殿上梁文至大庚戌十一月八日伏以經從易畫而後百千世賴夫子之功時自春秋至今三十二周庚戌之嵗孰序宫墻之有建詩書禮樂以無窮恭惟大道彌綸至誠化育有親有義有别有朋友亭亭當當六經之中合德合明合序合鬼神本本原原一貫之妙無極兩儀立不言百物生夏之時韶之樂獨以語克己之賢社之土稷之榖合無踰上丁之祭蓋出乎類拔乎萃自生民以來未有盛者也必有若能知聖人之為髙况過者化存者神與天地同流豈小補之哉非孟子誰發王道之為大新渥頒九重之詔大成加二字之封海宇咸振文風山林亦承德化闢兹精舍務在明經堂殿巍巍日瞻燕居之像佩襟濟濟人無鵠至之心道體鳶魚文章虎鳯凡異日有成之造皆昊天罔極之恩兹因六偉歌各述一經訓東易更四聖妙無窮六爻定位分三極萬物先天起一中西書從夫子攝其機未說道中有升降先從心上認危微南詩是宣尼手自删聲氣元從情性出文章不落語言間北禮書須要尋端的儀禮為經戴禮傳節文之中有儀則上樂在人心非絶響無容桑濮侈音聲可復簫韶真氣象下春秋要在尊王者王所為即天所為身之也非假之也伏願上梁之後斯文之運天開窮則變變則通通則久為學之功日進士希賢賢希聖聖希天善治聿興真儒輩出灝灝爾噩噩爾豈止用商周之書蕩蕩乎巍巍乎皆可行堯舜之世啓回常州總管聘啓伏以八九十曰耄今己踰致仕之年二千石惟良乃肯舉聘賢之禮辱知甚厚揆分奚堪兹蓋伏遇總管相公以豈弟慈祥之心行亷明公謹之政惠及齊氓者何啻千里如此太守者能有幾人重儒所以重民知學校之務急言治必先言化豈俗吏之能為有如炳文居然不武兹來匪遙於千里實為相知者十年日􅊰四書奚顧西湖之好景雲飛五朵又逢東道之主人真是有公卿下士之風何幸共友朋讀書之樂情深喜躍誼合摳趍但已戴琴書于歸舟未能受幣帛于將篚炳文不慚髮白誓報眼青朝取一士而拔尤何能當於奬拂厦廣萬間而庇士終冀入于帡幪感激殊深敷宣罔罄回汪仲剛啓伏以遣子從師俾立程門之雪崇儒重道特飛郇翰之雲自愧頺齡莫當雅意兹蓋伏遇某人才稱俊偉氣禀陽剛教篤義方特見徐卿之二子學根性理能敦韋氏之一經素聞詩禮于過庭且資友朋之麗澤某敢攄𠂻赤用報眼青一人求學之心倘無將至之鴻鵠萬里橫飛之翼尚有速化之鵾鵬回句容程宰招啓伏以聞絃歌之聲能知施于有政行束修以上愧不足以為師偶拜荆州劉公之書欲下南昌孺子之榻古禮有此今非其人伏念某童而習之老無能已以吾長乎爾苦來日之無多莫我知也夫抱遺經而獨處青眼一顧白髮如新幸無鄒子之先容肯索李生之髙價兹蓋伏遇某官鳴琴多暇製錦甚工士元非百里才何嘗不治冉求可千室邑豈曰非仁姑小試于牛刀乃先求于駿骨伊欲逐雲龍于東野又疑驚雪犬于南州樓謾想於行藏門當謹其出入未敢從容于函丈正須俯伏于仭墻以吾為邑長於斯固將學道則愛人也有笑于弟子之列安能受業而解惑哉聊抒下情少需後命明經書院請開講二十二啓與朱宏齊伏以學開槃水務六經根本之求望重香山主九老耆英之㑹誰賢書蠧敢屈杖鳩恭惟某耆德年髙雅懷博識傳來文公之𣲖豈必籝金生在謝氏之庭真其玉樹天已彰于陰德人皆徯其修程炳文辱知最深忝眷非薄宿宿信信端期歆向之偕來濟濟鏘鏘共仰孔顔之如在與趙鼎峯伏以文在兹乎欲為辨志離經之學鼎取新也願聽登峯造極之談龍象筵開鳶魚機動恭惟某丰儀清峻聞望老成壯嵗功名北海飛騰之萬里晚年著述西狩獲麟之一經孫喜見于曾𤣥家惟傳于清白炳文敬修尺牘仰屈文函胡氏之學乍興正須講貫趙衰之日可愛雅稱來遊與趙古淡伏以明經標學欲防士習之浮大雅惟公獨見古風之淡斯文有屬多士攸宗恭惟某器大名宏德穹望重一第拾芥便盍聫薇省之班幾載栽花今猶說桐鄉之政篤行素孚于閭里至誠纍動于神明壯志未衰晚成可卜炳文不慚末學敢屈耆英精舍題顔已揭李潮八分之字諸儒稽首願致南豐一瓣之香與趙植庵伏以胡安定建學立規欲資講明之舉趙清獻與物無忤能回淳固之風敢有請焉尚期來此恭惟某道心不競注述最精舊稱公子之振振凌雲折桂晚厭諸人之袞袞引水栽花文在兹乎學猶植也炳文僣開精舍敢屈華裾堂上衣冠盡一時之俊士儒人領袖屬前日之省元與鄭存齊伏以鄴侯三萬軸書盍明六經之要伏生九十餘嵗願愛百篇之傳尚有典型須求指畫恭惟某居今而學古貌蒼而意新早誦程文外樂何如內樂晚尊耆德小年不及大年滿目芝蘭知心松菊藻鑑之人惟舊蒲輪之詔方新炳文自愧庸庸猶知老老眼明蠅頭之字肯辭館下之諸生齒序燕毛之儀當冠坐中之衆老與滕山癯伏以六經天地之奧孰明辨之一儒山澤之癯能主張是再拜以請賜顧為榮恭惟某胸有五車眼空四海清音揮麈猶餘西晉之風流健句驚人何啻盛唐之氣象且四書之淹貫亦多士之歸依炳文苟創書堂有資講席一言悟道要豈徒研竹簡之書七日見陽來正好問梅花之訊與吳瑞軒伏以胡安定開湖學豈前武之能追吳雨崖講西銘喜斯文之可續一語能開于後進重來母􅐩於前言恭惟某望重邱山氣吞湖海香留晚節韓公老圃之花竒吐天葩郤氏一枝之桂詩書有子功名逼人雖絳雲之心卷舒自如恐大鵬之翼軒騰未已炳文苟焉創厦志在窮經審問之明辨之欲來四方之學者主張是綱維是賴有當代之偉人與戴晉翁伏以學開槃水無胡安定之成規望聳瑶山喜戴侍中之重席倚兹黃髮領我青襟恭惟某師友深源古今博覽寥寥文獻巍然魯靈光之存表表儀刑異乎漢專門之學有如兹舉式係斯文人皆笑其為迂公獨聞之而喜上梁之歌已騰于六偉升堂之講可吝于一來炳文兹焉麗澤之期聊當耆英之㑹地上明如德之晉誰無仰瞻山下泉似人之䝉有資剖擊與戴蒼山伏以道在六經泉混混而有本學先諸子山蒼蒼以彌髙書舍方新儒宗有舊恭惟某多聞多見古貌古心胸著數千言據班史以刪述家藏三萬軸泝戴禮之源流記誦云乎哉文章有屬矣炳文敢緣講學用集耆英月窟天根已見一陽之復雪伯霜仲來入九老之圖與方壺伏以建書堂於蘇湖之上道脉猶存望方壺于渤海之中仙風可挹愧莫追于前武幸嘉惠于斯文恭惟某玉闕精神春風氣象紫陽千峯之表學可人師青雲萬里之遙仕為令尹子弟欲其成耳功名何足凂哉炳文敬闕尺書仰攀丈席洪惟朱張之相與尚資審問明辨之功幸冀歆向之偕來共究溥博淵泉之學與戴恕翁伏以六經講明有志于本矣一言提要終身其恕乎姻婭親親友朋切切恭惟某存心無物滿腹有書馬空冀北之羣稱其德不稱其力鳯現河東之瑞難為弟又難為兄聨璧而來斷金有契炳文一為此舉多笑其迂洪惟禮記之傳賴有資於戴德自愧中庸之學不敢擬於胡公與潛心伏以來四方之友朋豈無合志對六經之賢聖正要潛心道在發明君其寵顧恭惟某風神秀整氣象冲融天驥奔電之才豈但空其冀北海鵬摶風之翮乃猶在于水南恐萬里功名之逼人喜一脉詩書之有子炳文猶記經營之始專承規畫之勤孔孟之詞聿新如所教矣潘楊之睦有舊能勿來乎與方則齊伏以學先經術愧斯道之未聞人有典刑喜其則之不逺筵開龍象機動鳶魚恭惟某身隱而名髙世今而心古泰山北斗儒者翕然宗之霜木晨星老成如此能幾儼衣冠于九老尊領袖于諸生炳文兹集朋友之羣蓋先齒德之一鱣堂講貫方當明辨之篤行之鳩杖來臨必能主張是綱維是與梅村伏以山學乍興非泮水春風之藻天機可見在前村雪夜之梅試認一畫之陽即明六經之要恭惟某修名揭日吐氣凌霄兩度看敬亭之雲未愁濡滯九重有直廬之地佇見飛騰蓋由器識之不凡乃知詩書之有用炳文自慚不武敢與斯文孔籍源流當考東家之實録阮林叔姪願來西晉之清風與蛟塘伏以義理無窮要在明經之學文章有屬願聞垂世之言敢布尺書仰攀丈席恭惟某精神玉立氣象春和志在青雲蛟龍豈池中之物心潛黃卷糟粕視紙上之文兹集佩襟有煩領袖炳文徼榮葭玉篤好蘭金老成萃一時聊當耆英之㑹儒者榮六藝願為根本之求與江古修伏以結屋依陽坡期闡六經之學汲古得修綆咸推多士之宗鳩杖肯來虎皮端坐恭惟某襟懷灑落氣象和平泝乾淳之淵源學者泰山北斗論貞元之人物公其霜木晨星循循然之教有賴焉陶陶然之號寓之耳炳文欲資兌習敢屈師嚴陳闕邱之諸子隨車喜見闕聚程伯子之門人侍坐願挹春風之和預此控申期以庚戌與程道大伏以王荆公之為文孰與胡安定之為學張橫渠之徼往亦為程先生之知來意見略同消息甚大恭惟某詩名早著理趣深潛虗五六以居中啓䝉之書為之翼加一倍而起數先天之學生于心諸孫花底之娛嬉皓首山中之著述炳文敢修尺牘仰屈丈函學者以經術為先當永刋于枝葉天下惟道理最大願共泝于淵源與朱實軒伏以明經幾百年甫開精舍晦翁第四世咸仰名家斯道未墜于箕裘後學有資于領袖恭惟某自持端厚人謂清髙學海波中之龍有自來矣秋風天上之鶚乃止是耶豈不武于青雲寧斯文之皓首炳文不揆其陋屈為此來山中之學方成蓋先釋菜花外之車可至政好觀梅與江雪矼伏以遙遙末胄敢云存湖學之風亹亹清談端似灑石矼之雪再拜以請一來為榮恭惟某奧學傳家清材拔俗遇侯翁之竒男子嘗奮志于青雲鄙張儀之大丈夫闕窮經而皓首表表愈偉菲菲彌章炳文僭敢奉書有闕讀易豈無泮水之藻幸惠顧乎山中共看先天之梅當相忘于意外與張西巖伏以明體適用豈如安定興學于東南砭頑矴愚賴有橫渠為銘于左右肯來鳩杖無遜臯比恭惟某光霽襟懷老來問學壯年場屋曽驚一鶚之飛晚嵗山林未應三鱣之瑞前修如此能幾後進翕然宗之炳文自笑其迂幸惠之顧深衣大帶先教我釋菜之儀斗酒篇詩當共君觀梅之樂與王太宇伏以師道立則善人多欲明孔籍泰宇定而天光發猶記莊𤣥適精舍之鼎新幸華裾之寵賁有體有用敢謂得胡安定之傳著易著書諒能明雙溪之學與方玉泉録判伏以斷金蘭契方當大集于衣冠潄玉泉聲胡啻如聞于環珮實同詩書之味豈但親戚之情恭惟某有用才猷不凡器識一官遊戲聊復披鶴􅌁而戴星冠六藝沈濳政自躡天根而探月窟炳文敢修尺楮仰屈丈函所講謂何自是同然之義理雖遠且至况是異姓之弟兄酬仁靜招書社啓蠧簡埋頭親二尺檠之燈火魚書到手開萬間厦之帡幪既無負米之勞昭仭采葑之意請惟么麼夙荷奬知天下逹尊三黼黻每加于溝木君子所教五丹鉛俾共于階蘭班荆酬昔者之言蟠木絶先容之助雖主擇客而客亦擇主固須聲應氣求然公求士甚士求公乃若天同神比勤渠若此銘篆何涯苐手停百家編常恐乏昌黎晨入之誨矧腹非五經笥每慮貽孝先晝眠之嘲所刺涵容儀圖稱塞受若直怠若事固小人平昔之所不為精于勤荒于嬉必諸郎于兹有以自朂因修謝櫝預扣𠂻旗考德行而興賢興能卿大夫既欽承于明詔懷忠信以待舉待取佳子弟行濟美于修程不盡頌期何當侍列請開學㑹啓二月十五日鄉有庠家有孰時當師範之尊鳥能弄花能言明日又春光之半敬因休暇少展綢繆顒卭願列于圭璋暢叙實娛于觴詠載酒問竒字常聞好善之風下馬入錦茵尤喜得羣賢之集勿瑕折簡幸賜聨鑣回玉湖招逰槃阿啓伏以問春多少已在荼䕷芍藥之間有客吾伊盡是金馬玉堂之彥願偕良㑹少展清歡尚賒山中笋蕨之甜足稱胸次詩書之味鳶魚之著飛躍千餘載可想于風雩賔主之美東南五百里當占于星聚即聨車從惠顧槃阿代戴答朱聘啓伏以詩首關雎朱傳明三綱之始禮先贄雁戴經謹百世之婚皆有係于斯文宜式諧于新好恭惟某男辛勤黃卷行當振于家聲而某女婉娩緑忩居能間于壼範過䝉采菲俾獲施松媒勤斧柯之言書粲金薤之字儀陳幣帛喜溢門䦨玩先天枝上之梅將迎長于紅日攀廣寒宫中之桂願早步于青雲雲峯集卷六
