body:
  text: 雲峯集别集類田元提要臣等謹案雲峯集十卷元胡炳文撰炳文有周易本義通釋巳著錄據林瀚所作是集序具原本葢二十卷後燬於兵明成化中其七世孫用光八世孫濬乃掇拾散佚編為此本凡襍文七卷附以賦四篇歌詞一篇詩一卷附以詞三首附録二卷則本傳行枤及贈答題詠詩文也炳文之學一以朱子為宗故其答陳櫟書云我輩居文公都熟文公書自是本分中事其作草堂學稿序厯舉前代詩人極詞醜詆有云縱迫曹劉何補於格致誠正縱迫謝鮑何補於修齊治平葢不指意於文章者然其襟文乃平正醇雅無宋入語録方言皆入筆墨之習其詩雖煩入擊壤集沠然如贈鶴庵相士四言北寺昏鐘廖塢晚烟拜鄂岳王墓濠觀亭贈二齊生諸篇皆不失雅韻殆其天姿本近於詞章故門徑雖殊而性靈時露歟至於古文之中往往間以藻飾如送文公五世孫序云自古及今人家疇無邱墓豈無巢翡翠卧麒麟者與吳草廬書云苔緑滋深而芹香莫采有負先聖先師環緑亭記云睿聖武公七十猶好學徳麟年方緑髩學當如何以文體論之皆為破律然較諸侈言載道毫不修飾者固有間矣乾隆四十二年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五雲峯集總目别集類四元卷一書論卷二記卷三序卷四題跋字説卷五碑墓誌傳卷六上梁文啟卷七箴銘賦辭卷八詩詩餘
