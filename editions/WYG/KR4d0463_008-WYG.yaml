body:
  text: 雲峯集卷八元胡炳文撰詩新溪書堂詩溪距溧水都二十五里舊流溢不可以舟闢之始通秦淮故名曰新茂清戴君家其旁浚詩書之源流善慶之澤盖深有得扵溪之新者遣其子諹從予學有新得故為之詩以美茂清益以美諹詩曰宇胡曰宙古往來今往者不滯來者方新陽昇扵旦帝出乎春日日嵗嵗新新相因茲水有溪胡以是名䝉泉不竭坎流不盈前一汲過後一汲生生生相易新新不停戴氏池塘居溪之際觀水有術扵道有契舊學未忘新功相繼能濯舊見以來新意有子有孫以書以詩如溪之新朝斯夕斯自彊不息慎獨母欺新而又新請視兹溪贈鶴庵相士四言我相爾鶴風骨卓犖九臯幽漠九霄寥廓爾性孤㓗爾音清徹夜月梅花松梢曉雪鶴亦相予謂予心古夀當九十伏生衛武我聞而笑鶴起而舞湏㬰飛去莫知爾所和李生詩行行能遠來匆匆輙辭去謂有新知樂乃成離别苦青春固所欣子當懐深懼菲菲弄芳妍怱怱傷遲暮人子三加冠責以為人父收心戒外馳回光宜内顧有屈乃有伸何思復何慮志帥能自持氣卒敢輕騖畜極亨天衢動初闢乾戶青雲第一程出門慎勿誤星源八景錦屏春色方山峩峩萬山叢紅紅紫紫開東風誰遣罘罳倚半空為嫌下界塵埃濛提起韶華千萬叠移來蜀城炫竒絶千工百巧花自如萬古一機天不裂繡水秋波星源沄沄從東來逶邐彎北勢欲回水上無風自成穀星溪此觀何竒哉化工妙手元不露刺破練溪能幾歩世間兒女巧己多樓頭針線月中度龍井曉雲華光殿東泉有靈下穴空洞神功㝠當時忽見蒼虬精年年簫皷來相迎五風十雨今年好靈物不要人祈禱非烟非霧騰清晨五色祥光焕晴昊僊巖夜月誰鑿太陰開四洞蟾光照破人間夣靈源千層石髓香金雞一唱巖花動白玉柱邊眠蒼虬絳花橋下行青牛我來絶愛讀書堂石圓水冷天風秋北寺昏鐘日斜一路紅䦨干日落四山蒼翠寒雲深不見招提處一聲兩聲起林端遥度前溪聲欲絶溪上漁舟撐未歇衆鳥棲定樹頭雲一僧歸踏松間月西湖水榭蚺城誰築溪之涯層樓簇簇排人家兩岸春風好楊栁一池霽月芙蓉花香與清風遠方覺汚泥不染塵不著小亭紅瞰碧波心着我中間㸔飛躍廖塢鶴煙一泓香泉流不涸一洞幽花自開落夜半月明松上聲知公乘雲下寥廓公去不知幾何年公歸猶認丹爐烟爐烟已冷春風暄花流洞口泉㳙㳙朱塘鷗雨鳴鳯不肯鳴晚周鷗鳥相隨九曲幽星源是公魯洙泗東池歴歴夣中逰一夜水痕髙幾許鳥也忘機淡無語朝來晴碧更好㸔天光雲影源頭水題呉桂芳所蔵張卽之墨蹟張公筆法工竒詭盈丈大書神愈偉飛來峰頭海日紅闕虎巖邊龍象舞巨靈血掌擘太岳雷椎迸火揮電雹今見小字又不然層霄閑雲淡無脚桃花春水滿唾壺家園新笋豐雪膄故人此餉自不惡况有一斛明月珠吳君好竒入骨髓我學不成空浪許好待滕光酌酒來元氣淋漓題辭語拜岳鄂王墓有公無此日再拜淚交頥大義君臣重孤忠天地知鴆毛何太毒龍渡只如斯墳畔休留檜行人欲斧之送張秋輝里有號奥五星者張其姓秋輝其字人問其字之故則曰秋最輝無如月物妍醜無遁形吾術當如是盖以自勉也推予命謂八十以上予以詩贈之造化妙璇璣誰能測奥㣲萬星皆夜現孤月最秋輝子術如今少吾年且古稀相期猶未艾白髪在漁機嚴先生祠次胡敬存韻鴻飛㝠㝠不可弋當時肯入搜羅中暫往自為故人屈竟歸不與餘子同眇視富貴意誰識大關名教功奚窮近來士氣頗卑懦艤舟祠下歌清風題富山汪王廟虬髯人出鹿歸唐多少英䧺失故鄉昔日六州曽捲土此邦千載尚尊王髙陵夜雨鳴弓劍原廟春風㓗豆觴燈火萬家元夕夜誰悲狐兔滿連昌題治平寺二十年前到治平青山歴歴記吾曽花因百五有孤注寺過十三無一僧雲影長昏天外日榆烟誰换佛前燈新安山水依然在不為空門管廢興送汪又善之宗文山長源流活水看鵝湖諸老曽談太極圖喫𦂳辨時非好辨開端無字豈虗無絶絃琴尚遺音響躍冶金湏正範模學計區區無足問斯文一脉要人扶自强齋詩勵志先湏異衆兒觀乾之象大哉詞莫輕操几從師樂正是加飡努力時黄卷聖賢宜静對青衿城闕戒荒嬉晝為夜息何曽息鄰屋雞鳴正仰思題葉氏烈女卷烈女夫天不載移誥花猶憶被恩時未同冀缺如賔敬夐出共姜守義詩一水星沉秋月皎半巖松老晚風悲朅來行實俱名筆應為流芳勒墓碑題揚州瓊花揚州觀裏瓊花樹何代人間得此栽素質偏宜琳舘護靈根端自玉京來九天甘露曽親浥三月羣芳敢並開折得一枝春正好綸巾斜揷下瑶臺挽休寜黄秋江先生母五十餘年鸞影孤今時誰謂柏舟無平生辛苦訓諸子百計甘鮮飬老姑名徹紫霄門外表徳書彤管閫中模哀榮千古無窮事増美江山十景圖挽句容北村先生孝是人生百行源先生扵此道彌敦白頭猶作嬰兒慕青佩咸知師表尊幾十百年紹書種一方寸地植仁根霜餘碩果今凋謝重為斯文憶北村挽黄陂主簿秋圃趙公故家人物説新塘文學能傳百世芳圃有寒香存老菊邑留遺愛美甘棠青燈夜雨蔵書閣綠酒春風戲綵堂明日金溪源上路千人㑹𦵏淚如滂題休寜夏氏雙應堂幾尺墳髙手自培終天無復飬南陔松楸在望長興歎草木無情亦見哀哭裂碧筠雙榦起淚含紅藥並頭開詩人秪是誇祥瑞孝感那知心上來挽畢梧山族望雲仍姓此村公由科第大其門蚤年璧水馳英譽方寸春風擁善根身後籝金書有種堂中刻木母如存誰将幽徳銘千古老筆當今有逹尊查氏山居五詠孝善橋有孝迺有徳多善必多祥水靣看虹影俯仰相與長濠觀亭魚不知子樂何必濠上觀子樂子自知月白秋江寒霜傑所嚴霜不可欺凄風不能折隐逸傳中人往往皆豪傑深净軒净不汚泥染清無片塵侵外直丈夫節中虗君子心内樂室我有安樂窩春風方寸地収拾早歸來此中有深味送董深山有序深山之號盖有取扵艮止而求深扵斯道者也一日訪予明經敢發此意題扵諸吟卷之尾炳文再拜遠林無限春意幽谷自涵太空行到水源窮處猶聞雞犬雲中洞口桃花易見源頭活水難尋欲知雲盡不盡湏到山深更深贈命卜法術周生非相自無闕憑君自相心塘心事源頭活水相如雲影天光山頭二齊生以迺祖之命來請予許之二生先往賦六言二生芒鞋去去老子風袂悠悠有約相隨花外定湏同到山頭贈圖書胡松友我有飬生四印從渠闕雙傳推出一牕明月梅花枝上先天題祁門鄭氏墓參天獨秀幾經春拜墓曽𤣥數百人隔隴不知誰氏塜㫁烟荒草卧麒麟萬卷晴巒桃源八景之一咸陽煨燼己成空猶有遺書積半穹幾度夕陽岡上落却疑餘㷔一星紅石牛石牛長卧此溪邊飢不青蒭渇不泉好倩六丁鞭䇿起江南多少未耕田桃花馬望夷宫裏失天真走入桃源避虐秦背上落紅吹不起至今猶帯武陵春詩餘和玉湖餞春大酺我欲箋天天無語渺渺誰司喉舌回㸔山色好有清池似玊一觴堪㓗却笑幾載京華嬌花媚桞攪動風情如熱何如槃阿裏自川原晝錦石矼晴雪更醉裏賡酬花邊吟嘯妙詞稱絶友鶯聲切切歌伐木怎賦騷中鴂最好是静中佳興眼底繁英四時春在那曽别笑殺渠癡曉鐘未動眼無交睫賞心處長娯悦花開有謝休問先天康節盡梁燕應解説贈呉又𤣥滿江紅呉又𤣥得其伯父子雲太博易學㳺戲𤣥折字間論人竆達貴賤累多竒中作此贈之一畫先天誰知得己涵𤣥九這易𤣥機括子雲傳授杜宇一聲春欲曉牡丹幾朶花開晝問堯夫數字自何來俱參透心胸裏羅星宿心畫上占爻繇㸔肆中簾捲門前車輳易字分明書日月口天真是談天口豈太𤣥而後遂無𤣥如今又為楊志行夀水調歌頭絳闕春回近先放玉堂梅當時産此人傑天豈偶然哉吾道以為元氣學者仰如北斗聊復振儒臺來嵗紫㣲閣閶闔㸔天開七旬老千里路為公來二十年前繡衣曽奉紫霞杯今對湖光山翠喜有碧桃玉藕夀酒得重陪明日賦歸去回首望蓬萊雲峯集卷八
