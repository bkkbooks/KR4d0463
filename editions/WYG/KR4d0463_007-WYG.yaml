body:
  text: 雲峯集卷七元胡炳文撰箴牀屏箴清明夜旦之氣正大天地之情勿謂㣲事而非至理勿謂暗中而無神明此古之君子所以不敢弛然自放扵牀第之上而且復戰戰兢兢也果齋箴友人髙彦道性嗜學其父甚樂而予未有以教之也彦道讀書之室請名扵予予書一果字與之且為箴箴曰坎水之流始扵䝉泉不果其行曷至于川賢必希聖聖必希天果能此者人十已千孰為凢民孰為豪傑萬里之程一念之烈遷善而果雷驚電掣克己而果矢去川决乾為木果艮為果蓏果剛在上蓏柔而堕最戒悠悠亦忌瑣瑣志髙力强果何不可節齋箴易至節卦六十爻三百六十合天地節而四時成四時有中氣有節氣節也者抑其過而歸之中也節之吉且亨與不節之嗟勸戒備矣六十四卦之終復戒之曰亦不知節也非惟飲酒水火未濟有孚節義存焉友人髙唐馬璧從予説易予名其齋曰節復為之箴箴曰天有節氣四時成嵗人能節性乃徳之萃坎水下塞為兊之澤有限而止儲豐扵嗇言失之放舌不可捫用失之侈生理曷存爵取節節樽取尊尊飲不知止多不遘痻保合扵乾闔戶扵坤欲不知止自斧其根所貴者節知止有定飬之以静持之以敬恬吾身心培吾德業存其固存節之又節牧菴箴為王伯武作書凢言牧保飬吾民易言自牧保飬吾心謙而又謙存心過厚譬彼善牧羊先牧後放羊能牧放心弗求欲動情勝氣暴神浮牧之何如敬而無失常自繩檢母令放逸母喜而馳母怒而競防壮之觸執謙之柄梏牛豶豕馬閑其輿畜之既極何天之衢銘得樂亭銘性分之中自有樂地世之人得之者鮮矣人孰無此心心孰無此性樂在内不在外得之由我而由人乎哉新溪戴君有道之士也以得樂名其燕處之亭新安胡炳文樂為之銘銘曰性天之樂自得其得匪厭飲食匪聲匪色其外不牽其中則全心逸日休其樂以天松邊新溪竹裏幽泉鱗泳禽翔孰匪自然存心飬性知止有定萬物静觀四時佳興樂得吾真性天之仁物得吾樂性天之春静室銘德方玉關人也學甚勤題其室曰静予為之銘銘曰太極之妙動静無始動者其用静者其體乾坤闔闢為易之門未闢之先闔戶謂坤喜怒哀樂未發之時渾然在中鬼神莫知無思無為不睹不聞非誠曷有非敬曷存惟静故虗惟虗故明尸居龍見淵黙雷聲乾專而直坤翕而闢静以制動心為太極動則為智静則為仁維仁之充萬物皆春正心齋銘友人馬惟貞平易敦厚無一㸃澆浮之習請名齋扵予予曰學易之法先正其心遂以正心名其齋且為之銘銘曰吾心之體本無不正欲正其用宜主乎敬心兮本虗有如太空能無喜怒不留于中如衡之平如鑒之明衡無留物能權重輕鑑中無有能照妍醜宻察吾心或存或否吾心之存可檢吾身吾失此心失吾為人常應乎物不與物馳防其邪曲敬以直之况扵學易尤當主敬舍此一心曷承三聖止善齋銘古杭沈生繼善純敏可愛自名其讀書之所曰止善齋求予銘銘曰善曰至善極曰太極人心天理自然之則如居之安兹維其宅如射之中兹維其的人莫能至至或易遷志之未果守之未堅心决所向知止有定欲堅所守莫如持敬明德之中至善存焉必止扵是迺純乎天人欲蟬蜕天理春融自新新民春意何窮自彊齋銘從孫祖義從予㳺予懼其弱不克進也名其齋曰自彊且復為之銘銘曰南北之彊囿扵風氣君子之彊純乎天理不能彊者頺然而靡是之謂弱六極之底其或能彊惟氣是恃外彊中乾實則餒矣硬着脊梁特立不倚𦂳着功程力行不已吾之此心與天同體唯天行徤一息萬里朝斯夕斯始是終是不務勝人而務勝己乾壮大象請觀所以自彊不息非禮勿履一心銘一而大者是之謂天一心之中一天存焉孰存此心主一無適心為天君敬乃天德存與堂銘并引江君某取古詩義掲二字扵中堂示其子孫曰存與庶子孫朝夕存之扵目不敢怠忘求予銘予竊歎世之人汲汲然求田問舍謂存此可與子孫不思天生我其初何以與我且獨不聞象山讀孟子乎此天之所以與我者一此字自作一句讀令人惕然有警省處盖天地之大莫大扵吾之心天之所以與我者此耳與此在天存此在我與此在我存此在子孫我存天所與我者則以與子孫子能存之以與子之子孫能存之以與孫之孫吾子孫即吾此心吾此心即吾子孫惟天不容偽惟天乆而不窮銘曰天之與我其初固存存天所與以與子孫豈惟子孫造化經綸充吾所與春滿乾坤雲峰胡炳文譔顧齋銘晦菴書院山長嚴陵邵春叟袖巨編示予泫然泣而言曰先君子言行有訓祗服不敢怠忘遂名其齋曰顧願子有以發之予為之三歎而言曰君年七十猶知顧其父之訓可謂孝矣論語四勿視為第一義大學三在顧為第一關目之為視常目在之為顧視則有意扵見顧雖不見而常若見之有回首戀戀不己之意編中詩若文發顧之義為詳獨未有拈出西銘中一顧字者盖在書曰顧諟大學引之而後此一字中格致誠正修身之工夫偹焉孟子曰顧飬西銘引之而後事父之孝與事天之仁兼焉是雖孟子顧飬之説而實含大學顧諟之㫖天何嘗不顧人人多不能顧天父何嘗不顧子子多不能顧父不顧天不仁不顧父不孝然所謂顧天者豈獨高髙在上之謂天天理在在呈露常目在之則謂之顧所謂顧父豈但飬口體父雖不在而常存之心目之間則謂之顧然而顧父即所以顧天天理常存扵一言一行之際父之顧子惟恐其言有餘而行不足子能顧父則常勉其所不足而不敢盡其所有餘言行相顧之際其機至宻西銘所謂理一分殊所謂即事父之孝以明事天之仁者不過如斯而己春叟盖用力扵西銘之學者然吾懼世之人不皆春叟也故為之銘以警銘曰人顧其外我顧其内顧外荒唐顧内廽光我言顧天匪顧以目天在吾心戒懼慎獨至若顧父視於無形僾然有見視死猶生言顧無浮行顧無尤有物有恒顧匪外求乾父坤母顧吾所生或不顧此請顧西銘蘭室銘為張徳庸作水孰無汀茲以蘭稱汀孰無室茲惟蘭馨惡彼繁華澹然幽寂静裏春風花中懿德采非其人德孰吾親寜不吾采吾意自新香不以迹而以其心乆與俱化其味深深姑從其類夷情和惠深濳純粹惟顔其庻賦雞鳴賦亥子混沌人物鴻濛汝喔喔兮初􅏒日杲杲兮将東雷之驚蟄也一嵗云始汝之驚人也旦旦如是鼓兩翼兮有聲作羣動兮不已舜蹠之徒其趨也異此時聞之皆悟而起暨汝再鳴日将中矣悠悠者晝寢營營者趨市鳴何殊哉聞者異耳故或名汝以翰音或呼汝以司晨或以朱而著姓或以碧而稱神孰知真機之自動無如旦氣之方新彼方同夣也此足以轟媱怠者之耳彼未起舞也此足以激忠義者之心至扵食必呼儔闘不留怒被服孔文爪距翼武羣出以朝羣棲以暮動静不失其時風雨不改其度聲者雄而牝者不敢與之雙唱者一而和者不可知其数是皆見扵已鳴之後而不知其已鳴之故萬籟無聲一天㣲露汝之初鳴乾将闢戶是謂一日之貞下起元而天地人物之一悟盖得乾坤之初者震巽乾坤之中為坎離坎司子之候離當午之時汝巽禽也乃通坎離之道而知夫子午天地之中正卯酉陰陽之出入陰之精而澤扵陽月之象而影於日汝之初鳴日猶未出扵此之時子以悟無極之真午以見道心惟一孜孜為善守而勿失舜人也我亦人也如之何其不可及也夫周氏節婦賦大德庚子信州永豐縣學以周氏貞婦聞扵有司明年春旌其門曰節婦周氏之門易其坊曰崇節坊初周氏年二十三歸于韓一紀夫喪三子皆幼終喪昆弟欲嫁之訖弗奪新安胡炳文為之賦曰詩胡為肇於關雎兮曰夫婦千古之綱常罹變酷而靡渝兮衛風獨詫扵共姜惟父之與母兮謂一家之嚴君紛姑息以為慈兮嗟孟母其罕聞固世衰而教弛兮况婦人其何知亶乾封之周氏兮嫓共孟而一之孀居四十春兮胡為不改其素也指蒼天以自矢兮夫唯靈脩之故也豈無膏與澤兮飛兩鬢其如蓬衆紛其儷美兮蹇予命之不同喧輿論之總總兮曰予有此姱節予豈樂聞此名兮悵悒欎其如結脱簮珥以教子兮躬績紡以勤家懿予行其如玉兮庻初終之無瑕舜繽紛其楊英兮蹇朝華而夕熸飽千霜與百霆兮松獨秀兮穹林旌髙風以勵俗兮岌崇門扵廣途凛霜日以争嚴兮羞人間之丈夫太極賦昆侖無外旁礴深廣孰鈎其𤣥為我指掌鰲極定位龍馬負圖五十虗中天地其發我矣乎龜書天錫禹疇攸則其中用五名曰皇極然則羲之則圖也卦有爻蓍有䇿文王周公亦既有辭矣胡為不以太極言扵易易者陰陽代換之名極者陰陽代換之理後際不見其終前瞻不見其始文王周公非不言也隂陽在是太極不離乎是爾不離者物物各具不雜者物物統體渾然者如此燦然者如彼造化氣也孰為氣之樞紐品彚形也孰為形之根柢不有夫子孰明厥㫖大哉易矣斯其至矣夫文王周公未嘗言太極也而發之者仲尼仲尼未嘗言無極也而明之者濓溪曰有曰無奚可岐而二之况所謂無者非視之不見而言希非聽之不聞而曰夷盖言無形而有理非如屋極之極可以形窺也非如北極之極可以象推也濓溪之説吾知其非得之扵師濓溪之心吾知其得之扵仲尼仲尼得之文王周公文王周公得之庖犧混兮闢兮其無窮兮不言者非私言之者非離然則孰為天地之太極曰人孰為人之太極曰心太極動而生陽静而生隂人者陰陽二氣之㑹心者陰陽不測之神人之一身萬物咸偹一方寸中具一天地所當得者将發之際原夫未發無偏無倚在圖書則中各有五五中有一一非心之體乎在先天則萬化萬事生乎心非即圖書之自中而起者乎動宜省察静宜涵飬誠心在致其知勿忘勿助之長立身以德行為先立言以明經為尚太極在我真實無妄往聖之絶學萬世之太平方當扵我乎有望辭送鄒雲樵歌山蒼蒼兮水迢迢羗樵翁兮逝逍遥月雙眸兮烱烱風兩袂兮飄飄歌正音兮歌以琴悵伯牙兮不可招俗降兮淳澆古心兮寥寥岌老柏兮不凋歸兮歸兮雲中樵雲峯集卷七
