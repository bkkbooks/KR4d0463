body:
  text: 雲峯集卷六元胡炳文撰上梁文明經書院大成殿上梁文至大庚戌十一月八日伏以經從易畫而後百千世賴夫子之功時自春秋至今三十二周庚戌之嵗塾序宫墻之有建詩書禮樂以無窮恭惟大道彌綸至誠化育有親有義有别有朋友亭亭當當六經之中合徳合明合序合鬼神本本原原一貫之妙無極兩儀立不言百物生夏之時韶之樂獨以語克己之賢社之土稷之榖合無踰上丁之祭蓋出乎類㧞乎萃自生民以来未有盛者也必有若能知聖人之為髙况過者化存者神與天地同流豈小補之哉非孟子誰發王道之為大新渥頒九重之詔大成加二字之封海宇咸振文風山林亦承徳化闢兹精舍務在明經堂殿巍巍日瞻燕居之像佩衿濟濟人無鵠至之心道體鳶魚文章虎鳯凢異日有成之造皆昊天罔極之恩兹因六偉歌各述一經訓東易更四聖妙無窮六爻定位分三極萬物先天起一中西書從夫子攝其機未説道中有升降先從心上認危㣲南詩是宣尼手自删聲氣元從情性出文章不落語言間北禮書湏要尋端的儀禮為經戴禮傳節文之中有儀則上樂在人心非絶響無容桑濮侈音聲可復簫韶真氣象下春秋要在尊王者王所為即天所為身之也非假之也伏願上梁之後斯文之運天開竆則變變則通通則乆為學之功日進士希賢賢希聖聖希天善治聿興真儒軰出灝灝爾噩噩爾豈止用商周之書蕩蕩乎巍巍乎皆可行堯舜之世啟回常州總管聘啟伏以八九十曰耄今己踰致仕之年二千石惟良乃肯舉聘賢之禮辱知甚厚揆分奚堪兹蓋伏遇總管相公以豈弟慈祥之心行亷明公謹之政惠及齊甿者何啻千里如此太守者能有幾人重儒所以重民知學校之務急言治必先言化豈俗吏之能為有如炳文居然不武兹来匪遥於千里實為相知者十年日􅊰四書奚顧西湖之好景雲飛五朶又逢東道之主人真是有公卿下士之風何幸共友朋讀書之樂情深喜躍誼合摳趍但已戴琴書扵歸舟未能受幣帛扵将篚炳文不慚髪白誓報眼青朝取一士而㧞尤何能當於奨拂厦廣萬間而庇士終冀入扵帡幪感激殊深敷宣罔罄回汪仲剛啟伏以遣子從師俾立程門之雪崇儒重道特飛郇翰之雲自愧頺齡莫當雅意兹蓋伏遇某人才稱俊偉氣禀陽剛教篤義方特見徐卿之二子學根性理能敦韋氏之一經素聞詩禮扵過庭且資友朋之麗澤某敢攄𠂻赤用報眼青一人求學之心倘無将至之鴻鵠萬里橫飛之翼尚有速化之鵾鵬回句容程宰招啟伏以聞絃歌之聲能知施扵有政行束脩以上愧不足以為師偶拜荆州劉公之書欲下南昌孺子之榻古禮有此今非其人伏念某童而習之老無能已以吾長乎爾苦来日之無多莫我知也夫抱遺經而獨處青眼一顧白髪如新幸無鄒子之先容肯索李生之髙價兹蓋伏遇某官鳴琴多暇製錦甚工士元非百里才何嘗不治冉求可千室邑豈曰非仁姑小試扵牛刀乃先求扵駿骨伊欲逐雲龍扵東野又疑驚雪犬扵南州樓謾想於行蔵門當謹其出入未敢從容扵函丈正湏俯伏扵仭墻以吾為邑長於斯固将學道則愛人也有笑扵弟子之列安能受業而觧惑哉聊抒下情少需後命明經書院請開講二十二啟與朱宏齋伏以學開槃水務六經根本之求望重香山主九老耆英之㑹誰賢書蠧敢屈杖鳩恭惟某耆徳年髙雅懐博識傳来文公之𣲖豈必籝金生在謝氏之庭真其玉樹天已彰扵陰徳人皆徯其修程炳文辱知最深忝眷非薄宿宿信信端期歆向之偕來濟濟鏘鏘共仰孔顔之如在與趙鼎峯伏以文在兹乎欲為辯志離經之學鼎取新也願聽登峯造極之談龍象筵開鳶魚機動恭惟某丰儀清峻聞望老成壮嵗功名北海飛騰之萬里晚年著述西狩獲麟之一經孫喜見扵曾𤣥家惟傳扵清白炳文敬脩尺牘仰屈文函胡氏之學乍興正湏講貫趙衰之日可愛雅稱來遊與趙古淡伏以明經標學欲防士習之浮大雅惟公獨見古風之淡斯文有屬多士攸宗恭惟某器大名宏德穹望重一第拾芥便盍聫薇省之班幾載栽花今猶説桐鄉之政篤行素孚扵閭里至誠累動扵神明壮志未衰晚成可卜炳文不慚末學敢屈耆英精舍題顔已掲李潮八分之字諸儒稽首願致南豐一瓣之香與趙植庵伏以胡安定建學立規欲資講明之舉趙清獻與物無忤能回淳固之風敢有請焉尚期來此恭惟某道心不競註述最精舊稱公子之振振凌雲折桂晚厭諸人之袞袞引水栽花文在兹乎學猶植也炳文僣開精舍敢屈華裾堂上衣冠盡一時之俊士儒人領袖屬前日之省元與鄭存齋伏以鄴侯三萬軸書盍明六經之要伏生九十餘嵗願愛百篇之傳尚有典型湏求指畫恭惟某居今而學古貌蒼而意新早誦程文外樂何如内樂晚尊耆徳小年不及大年滿目芝蘭知心松菊藻鑑之人惟舊蒲輪之詔方新炳文自愧庸庸猶知老老眼明蠅頭之字肯辭館下之諸生齒序燕毛之儀當冠坐中之衆老與滕山癯伏以六經天地之奥孰明辯之一儒山澤之癯能主張是再拜以請賜顧為榮恭惟某胸有五車眼空四海清音揮麈猶餘西晉之風流健句驚人何啻盛唐之氣象且四書之淹貫亦多士之歸依炳文苟創書堂有資講席一言悟道要豈徒研竹簡之書七日見陽來正好問梅花之訊與吳瑞軒伏以胡安定開湖學豈前武之能追吴雨崖講西銘喜斯文之可續一語能開扵後進重來母􅐩於前言恭惟某望重邱山氣吞湖海香留晚節韓公老圃之花竒吐天葩郄氏一枝之桂詩書有子功名逼人雖絳雲之心卷舒自如恐大鵬之翼軒騰未已炳文苟焉創厦志在窮經審問之明辯之欲来四方之學者主張是綱維是賴有當代之偉人與戴晉翁伏以學開槃水無胡安定之成規望聳瑶山喜戴侍中之重席倚兹黃髪領我青襟恭惟某師友深源古今博覽寥寥文獻巍然魯靈光之存表表儀刑異乎漢專門之學有如兹舉式係斯文人皆笑其為迂公獨聞之而喜上梁之歌已騰扵六偉升堂之講可吝扵一來炳文兹焉麗澤之期聊當耆英之㑹地上明如徳之晉誰無仰瞻山下泉似人之䝉有資剖撃與戴蒼山伏以道在六經泉混混而有本學先諸子山蒼蒼以彌髙書舍方新儒宗有舊恭惟某多聞多見古貌古心胸著數千言據班史以刪述家蔵三萬軸泝戴禮之源流記誦云乎哉文章有屬矣炳文敢縁講學用集耆英月窟天根已見一陽之復雪伯霜仲來入九老之圖與方壺伏以建書堂於蘇湖之上道脉猶存望方壺扵渤海之中仙風可挹愧莫追扵前武幸嘉惠扵斯文恭惟某玉闕精神春風氣象紫陽千峯之表學可人師青雲萬里之遥仕為令尹子弟欲其成耳功名何足凂哉炳文敬闕尺書仰攀丈席洪惟朱張之相與尚資審問明辯之功幸冀歆向之偕來共究溥博淵泉之學與戴恕翁伏以六經講明有志扵本矣一言提要終身其恕乎姻婭親親友朋切切恭惟某存心無物滿腹有書馬空冀北之羣稱其德不稱其力鳯現河東之瑞難為弟又難為兄聨璧而來斷金有契炳文一為此舉多笑其迂洪惟禮記之傳賴有資於戴德自愧中庸之學不敢儗於胡公與潛心伏以來四方之友朋豈無合志對六經之賢聖正要潛心道在發明君其寵顧恭惟某風神秀整氣象冲融天驥奔電之才豈但空其冀北海􅉇摶風之翮乃猶在扵水南恐萬里功名之逼人喜一脉詩書之有子炳文猶記經營之始專承規畫之勤孔孟之詞聿新如所教矣潘楊之睦有舊能勿來乎與方則齋伏以學先經術愧斯道之未聞人有典刑喜其則之不逺筵開龍象機動鳶魚恭惟某身隱而名髙世今而心古泰山北斗儒者翕然宗之霜木晨星老成如此能幾儼衣冠扵九老尊領袖扵諸生炳文兹集朋友之羣盖先齒徳之一鱣堂講貫方當明辯之篤行之鳩杖來臨必能主張是綱維是與梅村伏以山學乍興非泮水春風之藻天機可見在前村雪夜之梅試認一畫之陽即明六經之要恭惟某脩名掲日吐氣凌霄兩度㸔敬亭之雲未愁濡滯九重有直廬之地佇見飛騰盖由噐識之不凡乃知詩書之有用炳文自慚不武敢與斯文孔籍源流當考東家之實録阮林叔姪願來西晉之清風與蛟塘伏以義理無窮要在明經之學文章有屬願聞垂世之言敢布尺書仰攀丈席恭惟某精神玉立氣象春和志在青雲蛟龍豈池中之物心潛黄卷糟粕視紙上之文兹集佩衿有煩領袖炳文徼榮葭玉篤好蘭金老成萃一時聊當耆英之㑹儒者榮六藝願為根本之求與江古脩伏以結屋依陽坡期闡六經之學汲古得脩綆咸推多士之宗鳩杖肯來虎皮端坐恭惟某襟懐洒落氣象和平泝乾淳之淵源學者泰山北斗論貞元之人物公其霜木晨星循循然之教有頼焉陶陶然之號寓之耳炳文欲資兌習敢屈師嚴陳闕邱之諸子随車喜見闕聚程伯子之門人侍坐願挹春風之和預此控申期以庚戌與程道大伏以王荆公之為文孰與胡安定之為學張横渠之徼往亦為程先生之知來意見略同消息甚大恭惟某詩名早著理趣深潛虗五六以居中啟䝉之書為之翼加一倍而起數先天之學生扵心諸孫花底之娛嬉皓首山中之著述炳文敢脩尺牘仰屈丈函學者以經術為先當永刋扵枝葉天下惟道理最大願共泝扵淵源與朱實軒伏以明經幾百年甫開精舍晦翁第四世咸仰名家斯道未墜扵箕裘後學有資扵領袖恭惟某自持端厚人謂清髙學海波中之龍有自來矣秋風天上之鶚乃止是耶豈不武扵青雲寜斯文之皓首炳文不揆其陋屈為此來山中之學方成蓋先釋菜花外之車可至政好觀梅與江雪矼伏以遥遥末胄敢云存湖學之風亹亹清談端似洒石矼之雪再拜以請一來為榮恭惟某奥學傳家清材㧞俗遇侯翁之竒男子嘗奮志扵青雲鄙張儀之大丈夫闕窮經而皓首表表愈偉菲菲彌章炳文僭敢奉書有闕讀易豈無泮水之藻幸惠顧乎山中共㸔先天之梅當相忘扵意外與張西巖伏以明體適用豈如安定興學扵東南砭頑矴愚賴有横渠為銘扵左右肯來鳩杖無遜臯比恭惟某光霽襟懐老來問學壮年場屋曽驚一鶚之飛晚嵗山林未應三鱣之瑞前脩如此能幾後進翕然宗之炳文自笑其迂幸惠之顧深衣大帯先教我釋菜之儀斗酒篇詩當共君觀梅之樂與王太宇伏以師道立則善人多欲明孔籍泰宇定而天光發猶記荘𤣥適精舍之鼎新幸華裾之寵賁有體有用敢謂得胡安定之傳著易著書諒能明雙溪之學與方玉泉録判伏以斷金蘭契方當大集扵衣冠潄玉泉聲胡啻如聞扵環珮實同詩書之味豈但親戚之情恭惟某有用才猷不凢噐識一官㳺戲聊復披鶴􅌁而戴星冠六藝沈濳政自躡天根而探月窟炳文敢脩尺楮仰屈丈函所講謂何自是同然之義理雖遠且至况是異姓之弟兄酬仁静招書社啟蠧簡埋頭親二尺檠之燈火魚書到手開萬間厦之帡幪既無負米之勞昭仭采葑之意請惟么麽夙荷奨知天下逹尊三黼黻每加扵溝木君子所教五丹鉛俾共扵堦蘭班荆酬昔者之言蟠木絶先容之助雖主擇客而客亦擇主固湏聲應氣求然公求士甚士求公乃若天同神比勤渠若此銘篆何涯苐手停百家編常恐乏昌黎晨入之誨矧腹非五經笥每慮貽孝先晝眠之嘲所刺涵容儀圖稱塞受若直怠若事固小人平昔之所不為精于勤荒于嬉必諸郎扵兹有以自朂因脩謝櫝預扣𠂻旗考徳行而興賢興能卿大夫既欽承扵明詔懐忠信以待舉待取佳子弟行濟美扵脩程不盡頌期何當侍列請開學㑹啟二月十五日鄉有庠家有塾時當師範之尊鳥能弄花能言明日又春光之半敬因休暇少展綢繆顒卭願列扵圭璋暢叙實娛扵觴詠載酒問竒字常聞好善之風下馬入錦茵尤喜得羣賢之集勿瑕折簡幸賜聨鑣回玉湖招逰槃阿啟伏以問春多少已在荼䕷芍藥之間有客吾伊盡是金馬玉堂之彦願偕良㑹少展清歡尚賒山中笋蕨之甜足稱胸次詩書之味鳶魚之著飛躍千餘載可想扵風雩賔主之美東南五百里當占扵星聚即聨車從惠顧槃阿代戴答朱聘啟伏以詩首關雎朱傳明三綱之始禮先贄雁戴經謹百世之婚皆有係扵斯文宜式諧扵新好恭惟某男辛勤黄卷行當振扵家聲而某女婉娩緑忩居能閑扵壼範過䝉采菲俾獲施松媒勤斧柯之言書粲金薤之字儀陳幣帛喜溢門䦨玩先天枝上之梅将迎長扵紅日攀廣寒宫中之桂願早歩扵青雲雲峯集卷六
