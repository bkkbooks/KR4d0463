body:
  text: 雲峯集卷二元胡炳文撰記鄉賢祠記歙婺源為子朱子闕里亦既有專祠矣州學鄉賢祠復並杞二程夫子者何孔子之先宋人孟子魯公族河南實吾新安黃墩忠壯公後也忠壯公諱靈洗仕梁陳贈鎮西將軍開府儀同三司有功德于民配大享南史有傳宋號世忠廟封忠烈顯惠靈順善應王新安志叙先逹第一謹按程叔子撰明道純公行狀河南之程出自中山博野又按歐陽公撰程文簡公父冀國公元白神道碑銘中山博野之程出自靈洗文簡公諱琳與太中公諱珦為兄弟如此則新安為河南所出何疑哉或曰朱子自書新安程子不書者何蓋由新安而建寧一世而近故書由新安而河南凡二十餘世中間遷徙不常故不得獨書然程子可不書新安紀新安之人物而不書程子是譜宋之後而不書孔子系魯公族而不書孟子非闕典與近有為道統之說者曰聖賢之生天地氣化相為循環冀在北岐周在西魯在東舂陵新安在南夫斯道絶續天也自北而南迭生聖賢以續道統之傳非偶然也方今程朱之學行天下薄海內外遐陬僻壤猶有學其學者况兹大好山水乃其雲之泰山河之崑崙也哉此鄉賢祠之所由作也詩不云乎維嶽降神生甫及申吾新安以之又不云乎高山仰止景行行止吾新安之士當以之祠成於泰定甲子發其議者州學賔前兩貢補生京學諭草庭程公鼎新主之者提學官太守史奉議光祖記之者胡炳文書之者王儀皆州人也逰鍾山記江以南形勝無如升鍾山又升最勝處豫至升首過上元謁明道先生祠禮畢即度關逰山夾路松隂亘八九里清風時來寒濤吼空斯須寂然路左入半山先是謝太傅園池荆公宅之捐為寺至今祠公與傳法沙門等出入三四里又入一寺𢎞麗視半山百倍龕鎪壁繪光彩奪目詭狀萬千兩廡級石而升四五十丈始至寶公塔塔邊有軒名木末履舄之下天籟徐鳴浮嵐暖翠可俯而挹下有羲之墨池投以小石遠聞聲出叢葦間徑狹荒蕪逰客罕至獨拜塔者纍纍不絶長老云寶公巢生而人朱氏取而子之後成佛凡禱水旱疾疫如響語多不經由塔後循山而左過安石讀書所山石堀壘忽敞平原修篁老檜萬緑相扶風鳴交加猶作當時吾伊聲又行數里休于觀音亭其旁八功德泉有聲鏘然汨汨至亭下則囦然以涵或謂病者飲此立瘳衆皆飲豫以無疾不飲遂回塔後攀松升磴六七里至小椒巨石人立豫登石以坐鳯臺鷺洲眇不知在何許但覺繚白縈青隱見煙霞間城中數萬家樓閣如畫其間曠無人處六朝故宫也北視揚子江頭一舟如葉行移時不能咫浪楫風帆想數十里遙矣蟠龍踞虎亘以長江其險也如此黃旗紫蓋王氣猶有時而終令人凄然久之下山至七佛菴白雲凄潤囂壒不來一僧噓石爐灰㸃鬚眉如雪一僧蓬跣崖邉拾松子以歸語客質木絶不與前寺僧類聞其下有猛公菴子文廟山水稍竒麗率為事神若佛者家焉豫不復往欲訪草堂猿鶴莫得其處遂朗吟小山招隱循故道御天風而下兩袂如飛山僧迎于門欲設豫供豫力辭亟入關復至明道精舍少憩而歸因唶唶曰升自紫髯翁以來幾興衰矣眼前花草無復當時光景伯子春風千載猶將見之至若熙寧相業非不焯焯然炫人耳目迄不如主上元簿者復祠于學何哉欣慨交集遂為之記同逰者王士晦黃元卿茅安上饒林畔遊汀社壇記社古禮也壇而不屋因地所宜木為主今庶民之社往往多繪事於家屋而不壇非古繪一皓首龎眉者尊稱之曰社公而以老媪嫓之寖非古矣遊汀張公泰宇因見文公所述政和禮儀取舊所繪焚之於是就汀中印墩築壇北向以石為主環植嘉樹前為屋四楹備風雨捐秫田二畝共祭酒社制之古略見于今且將使家敦孝悌崇禮遜熙熙然相與為太平之民非惟復社制之古且復人心之古泰宇賢矣哉泰宇名起鳯今年七十有四記之者同郡胡炳文也長泰宇五歲泰定戊辰正月記思菴記凡廬於親墓者所以致其思玉淵程公墓距環溪一里子萬善築菴亦名曰思以豫與公斯文交知公詳且信請豫記豫曰子之思當以異乎人之子之思者矣公年後豫一紀敏學豫莫能及幼即自念曰吾上世於子朱子為內弟講學至老不輟豫弗力于箕裘將何以世吾家昕夕劬書習易與春秋為文汪洋閎肆落筆數千言不能休果堂李公竒其文以女妻之公之行不波以同不崖以異不殊馬丞相所以志果堂者居家孝於親處鄉里姻族誼以慈待朋友信而慤今沒三十餘年每論文輒思之不能忘而况其族里又况其子哉人子能竭其無窮之思不能報無窮之天其所以思之者將如之何其思之哉祭義思有五末思其所嗜最切公性淡泊於外物一無所嗜惟嗜學而已子與孫思公不得見則亦惟有學公之學而已窮經所以致用立身可以顯揚孝與學字皆從子人子之學即所以學為人子者但孝貴永思永則不匱學在近思近則不泛仰而思愈深愈遠反而思愈近愈切思菴之思其諸異乎人之子之思歟松楸彌望公墳在前公如有知必然吾言公諱良金天厯三年二月朔契家生胡炳文記隨齊記齊名隨隨我志也乙亥三月舊廬燬老幼無所於居隨力創小屋二間而其時瓦價甚翔拾完瓦得數千覆其左餘莫克潰于成遂茨其右左宜隩處月明風清又不如右之踈暢得以逰目遣懷也故床几或左或右未免隨寒暑燥濕為之轉徙焉屋三隅有隙地袤不丈尋或樹以桑果或蔬以菘韭隨宜奉雙親莫時得甘旨菽水盡歡隨分有過我者相與分席而坐談近詩商略古今人物雖久不厭或厭貧賤不豫顧亦不强邀以來隨人夜漏下未二三刻胥徒呌囂禁燈戢行甚嚴豫不復課夜讀日曛則扄柴門暗坐隨時客問天下事如何豫咄咄不敢出諸口隨天有訹之仕曰金貂銀菟趨者爛倒子求一北道主人繅籍薦進之所易易爾大丈夫志四方胡忍俱草木以腐豫大笑不答隨我我雲峯老人胡炳文也是為記初齊記泰山徐晟字子初受易於豫將歸拜而請曰齊名初先生所命也願發之以易庶朝夕觀覽如在先生側豫嘉其意為之言曰易六位時成第一畫不言一而言初謹其幾之萌也乾則謹其陽之在下坤則謹乎隂之始凝也今夫日晝夜隨天行無頃刻停厥初出地旦氣清明今夫水來而不窮流而不盈泉出之初至靜至清今夫木帝出乎震欣欣向榮而其初也蟠根之固由地中生吾復吾初在乎意誠崇吾尊爵而不汨於情寶我靈龜而不役於形獨行乎素履之願麗澤乎和兌之明昭於晉育於蒙積於升出而棟明堂基太平初之明將麗乎午天初之泉將達乎四溟初之木亦將可凌高寒而蔽廣庭矣矧吾子初青春茂齡良馬之逐天衢之亨可不日間輿衛而致謹於出門第一程哉明復齊記友人王敏夫以明復名其書室請記於豫豫曰子學易盍稽之易復造化隂靜而陽動世亂而治吾道屈而伸無有極而不復者然必曰七日復由乎數人善端有時發見亦無有不可復也復之由乎學論語大學第一章首揭一學字子朱子謂明善而復其初皆因學言復性本善學以明其善心本明學以明其明不失無復不學不能復然古今之學有三曰吾儒之學曰訓詁之學曰詞章之學漢專門尚訓詁注盡聖賢千言萬語於身心無纎毫益唐科舉詞章則枝葉愈繁本根愈失而去道愈遠矣惜不知我得於天者何物復初九所謂不遠復者何事純粹至善也而吾自汨其初之性虛靈不昧也而吾自昏其初之心其為學非徒無益而已也然則古之儒者學焉惟在乎復後世記誦詞章非不學焉而不能復學而復是謂內學學而不能復是謂外學內學可逹於外外學無益於內心有內外之異而學係之而世道係之善學者於此宜知所擇敏夫性醇學篤復卦之旨蓋稔聞之以此名齊其自警也甚嚴矣尚亦䆒其所知而力行之也哉存誠堂記鄉人余賢父歸自番昌溪手詩文一卷告豫曰有士彭元濟欲親拜文席求正疾弗果其堂扁曰存誠欲求記再拜託致懇于左右豫嘉其志遂為之說曰誠之說始商書備中庸乾九二文言曰中曰庸曰誠子思因之誠未易言存誠未易能漢儒無有能識此字者宋李邦直以為不欺徐仲車以為不息子程子始曰無妄子朱子又加以真實二字誠之說始定誠豈易言哉彭君能以聖賢之言深體而力行之不為口耳文字之習必始終表裏如一則誠庶幾乎存而斯堂之扁不虛矣彭君朂哉體仁堂記歙名醫道川程公字其子與京藥室曰體仁徴豫記甚勤豫曰醫仁術也請以醫喻六脉心在左手寸為第一宜洪大體宜靜仁人心也體靜而用洪人有不仁心無不仁故藥於杏桃薏苡郁李柏子之類用其心亦名曰仁心如榖種仁其生之性藥不用榖而用榖之蘖或麥蘖蘖取其發猶仁之端人參似人身者最神仁者人也人指人身而言深體味之可見彼痿痺者身非其身矣孔門問仁者多有病樊遲鄙病在不洪子張外有餘而內不足司馬躁病在不靜夫子如大醫王隨病與藥語仲弓是滋養法語顔子是攻治法病根悉拔元氣自還諸子受針砭各異頂門一針惟顔能受之大抵藥宜真言色稍涉僞非仁六陳外宜新學不濯去舊見非仁脉證分隂陽表裏心不嚴內外賔主之分非仁元氣貫注四肢一毫虧一息滯即是病是故此心全體而不息乃謂之仁如與京醫既十七世而又軫之邃劑之精病在人視之如在已是謂體之深又能表裏始終無一㸃規利意是謂體之全而全體又不息吾此體即此仁不待體乾之仁是謂仁之至與京四世祖克菴先生於子朱子為內外兄弟其家學所漸蓋不當但以醫名也故為之記四勿齊記族孫孟成連年館歙為其主人鄭氏知遠求四勿齊記豫曰記在程子針中知逺請不懈益勤程子年十六作顔子好學論謂其學在於正其心養其性後作是針亦復舉心與性言之虛言心之體動言心之用彛言天命之性習言氣質之性互見也顔子四勿之功渾然天理之心勿為私欲勝也本然天命之性勿為氣質勝也物欲本心之賊氣偏本性之讎大將旗一麾三軍用命賊讎退聽然則勿也者非吾方寸所以為將而耳目口體之所以從令者乎或謂聽針似無工夫殊不知視之蔽在前聽之蔽左右前後皆可入離為目明在外故當制之於外以安其內坎為耳明在內非知於內其不為外之所誘者鮮矣言禁其外之邪妄者以不失其內之靜專者誠之於思者內無妄動守之於為者外母輕動四勿皆制於外之事然先覺內之知止以制於外哲人內之思誠不待制之於外此又程子微意之所在也知逺以此名齊篤教其子好學不倦誠有志於學顔子之學者故豫為發程子之針而為之記靜春齊記濟南程光道學易於豫豫扁其讀易之堂曰靜春而光道復請豫記之豫按程子所謂靜中春意者匪徒見春之時而見四時之皆春也匪徒見春之在天地萬物者而自有見於吾心中之春也大造無言四時自行百物自生至靜中無窮春意常人之心膠膠擾擾雖在春風中而不見其所以為春者猶與人終日交識其面未識其心也無極太極心之本體無思無為其本恆靜天地萬物之春皆出乎此而人往往自以動失之豫嘗論太極圗通書與中庸相表裏太極生生春意何窮圖說主靜通書終之以䝉與艮即中庸所謂淵淵浩浩皆自大本中出而不睹不聞不動不言之際主靜工夫始終具焉及其靜之極而無聲無臭之天即吾無思無為之易即吾喜怒哀樂未發之中即周子所謂太極本無極也天地自位萬物自育天下自平靜之功用淵且宏矣光道誠能沉濳吾易䝉之山下出泉吾之靜而清也艮之兼山吾之靜而光明也窗前之草川上之花至前之梅皆吾之靜而無靜也然伯子終日靜坐猶泥塑從之遊者如坐春風中叔子瞑目無言當時立門外尺雪者與坐春風無異何也天地萬物之春固在光風駘蕩中而未嘗不可見之風雪凌厲之際也春無迹見不以目非暗然自修如佩韋晦木者孰能自然有見於此哉光道性靜可語學豫故告之以此復書而為之記琴琅玕記竹在植物中得扶輿清徑之氣為多玉與琴聲極清韶堂下樂不敢與之齒此昔人特以琅玕名竹或以名琴而吾友子墅環其居數千竿豫每造之清風露氣灑灑襲人時則琴未聲也吾已領琴之趣矣坐定焚香為豫一再鼓之子猷心事指下歷歷可見曲中遺韻凝在林端未幾劃然笑戞然鳴又若聲應而氣求者豫嘗評之二物頗類有道而人或莫之如氣恆清人旦晝莫如其夜味恆淡道義之交變以勢利而移心恆虛人之不梏於欲者罕矣翁居常對竹作吾伊聲倦或枕書以臥起或三四弄或一鼓輒罷讀書或對客作文字飲或後園巡花樹或花下弄諸孫世間榮利殆無足以干之者翁真有道之士乎哉之二者受翁之知以故供翁吟弄久益不厭世非無所於竹者胸次且自無風月荃蕙為茅琴亦復作鄭衛聲竹琅玕琴不復琅玕矣非琴之不復琅玕也人琴其琴而不琅玕其琴也嗚呼此所以憮然思翁而三慨也翁嘗命子京從豫遊彼竹之孫猶冀其日峻月茂凌厲風雲未已也子京勉乎哉環緑亭記浙東都元帥本齊王公為汪子英扁其亭曰環緑子英沒其子德麟述其父作亭之顚末王公所以名其亭之意屬豫作文記之豫嘉其意為之言曰穹壤間美景無限在人受用如何耳斯亭也溪山竹樹萬緑森然一覽在目好天良夕肅賔友觴詠其間樽中之緑與溪山相映至足樂也其庶不負斯亭乎雖然未也亭與泮水為鄰有藻有芹有茅春波漾緑大有可采能采采不已其樂有浮于觴詠者矣雖然猶未也窗外竹色侵書帙几上竹簡光浮試取緣竹詩歌之睿聖武公九十猶好學德麟年方緑鬢學當如何况今有科舉又有儒吏科倘昆仲能知好學異日各取恩袍以為親榮萱花在堂環緑在側以副王公名亭之意子其勉之是為記至順元年春三月吉旦雲峯胡炳文記水流花間亭記水流花間者桃源潘氏燕息之亭子溫繼其祖玉成翁之志為之也度圃規池栽花蒔竹紅香緑䕃俯瞰清溪春有崇桃明霞炫晝夏有浮植香動凉颸秋有天香古桂晚節寒花花凡數十種多異品冬則寒梅欲蕊春蘭已芽造化循環生生之妙可見也他凡竒芳珍卉四時之花不同而一水恆流其間流者自流非有意於花之開開者自開亦何心於水之流適然有相值之機悠然有相得之趣雖自形自色而若相應相求者子溫讀書之暇侍父叔昆從或偕賔友相羊其間景與心㑹至樂之味當有未易以言喻者然水有源花有本方其涓涓始流固已欣欣向榮其流也愈不息其生也愈不窮蓋花之本由水以生而其末皆水之澤也子溫於此有所思焉感慨係之矣玉成翁以勤儉起家以詩書迪後子溫天質峻茂加之學殖以培其根以逹其支以暢其華以無負源頭生生之造其為繼志固有大於此者矣子溫朂哉深秀樓記深秀者桂軒呂君以名其燕息之樓也樓在兩山間左石峭壁雄峙若不相讓迫遽回合勢如拱揖前三峯誇竒競秀又若自獻於兹樓者太守東平史公為扁其顔且徴記於豫豫按呂氏世家灃溪之上比屋而居族大以蕃君性喜靜遷居山中有年矣今又自其居深入數十弓刜薈翳鑿孱巖中起巍樓翼以華屋畫棟朱甍與穹谷嵁巖相為輝映蒼筠怪木珍卉竒芳環繞幽遐一覽在目塵囂不入清風自生花香禽弄四時恆有幽趣君於兹樓之勝蓋有不徒取其秀而取其深者矣詞華非不足多而根本之培當不淺才氣非不足尚而道德之味貴有餘君其能攬山川之深秀而為胸中之邱壑者乎是宜為之記矣中齊記中齊者高君仲達以扁其讀書之所也客有難者曰此一字勳華以相授受𤣥聖以為德之至紫陽夫子以為天下之理無復加仲達取以名齊不過乎豫曰何人無此何時無此何事無此何人之心無此即吾天然自有者名吾齊奚其過况高氏自汴遷杭緗素相傳不知幾葉仲達之先大父號益齊蓋有得於益三四二爻之㫖父聲甫科舉未興時嘗命仲達曰古者儒皆可吏吏無非儒爾其以儒飾吏庶不俗不迂以不悖于時暨科舉行仲達呼其子立本命之曰我家自祕丞公以進士出身代不乏人一脉斯文罔俾今不承于古汝其學焉以襲世科以繩祖武前後授受之言若不同彼一時此一時皆為不失隨時之義者仲逹嘗為歙典史歙人德之今為江浙等處儒學提舉司都吏目數十路之士德之儒臺楊公清正嚴敬於人少許可仲達獨得見之跡其為人與人交不傲不諂平居食服不陋不侈性不嗜飲而好以觴客表表然為吏師而汲汲然教子為儒以此名齊蓋欲常目在之而用功於動靜語默之間求以不失乎此爾客以為過得非客之言過歟客又難曰子為中齊記終始不及所謂中獨冀其用力於動靜云為若何豫曰中無定體隨時而在不在動靜云為敢問中在何處客不能答遂書以記宏山庵祠堂記宏山有庵庵有祠銅川胡氏有初也歙婺源考水胡為著姓唐明經為之初明經十一世而下有居鄱陽德興者銅川府君為之初府君諱伯龍字仲虞紹興庚午生考水淳熙壬寅遷銅川至慶元庚申而終孺人汪氏生紹興辛未以紹定庚寅慶恩封孺人子本初本中本固本恭壬戌冬奉公喪葬宏山嗣塢塢之名嗣山之名宏若開銅川後嗣宏遠之祥者創庵遂名宏山初命僧智圓居之庵田二十畝初中益為三十歲得米六十石六之五飯僧一賦于官山川雄秀松楸䝉密每寒食拜墓下子子孫孫森如也抑嘗遡其初求之乎自唐天祐今四百五十餘年世代凡幾更宋淳熙以後亦將二百載吾宗獨幸繁衍如許書香道味復深遠如許上而明經公近而銅川府君不有以敷遺我後人得至是哉是故譜有初心亦有初繼自今子子孫孫皆能不失祖宗初心葆固本根益深以宏他日枝葉之峻茂又豈不益宏且逺哉然則宏山之庵之祠有初也蓋不惟譜之初而已也山若地及墓前田元𨽻本初子孫後遜于本固子舉遜本中孫文煒皆不已私以歸于庵如初皇慶癸丑嘗撤是庵而新之宏敞視初有加舉遜之子文楧屢度僧能繼其初智圓不忝重建祠增田本固曾孫德常特來求記以垂永久皆可書田凡𨽻婺源德興者悉以聞于有司具于碑隂兹不書文煒子士元從事即蘇州判官孫五薜徹兆卿從事郎今為古田縣丞某年月日炳文記并書雲峯集卷二
