body:
  text: 雲峯集卷一元胡炳文撰書代族子淀上草廬吳先生求記明經書院書九月十五日新安後學胡淀謹再拜奉書于司業草廬先生師席是日也文公先生始生之日昔臧榮緒用庚子日拜五經是為夫子所生之日婺源文公父母邦禮以義起黎明舍菜竣事復再拜而作是書惟先生其鑒之淀初謂六經者聖人明天下後世之大經以經天下萬世者也其體全體其用大用六經未作六經之理在天地化育中在聖賢事業中六經既作天地萬物之藴聖賢之心之事業又在六經中三代以上經未全而經之道行秦火而後經不全而經之道彌破至明道寶元間安定先生始教人明經學然後為士者稍知經有體有用既而明於伊洛大明於我新安經非不明也然學者淪於舊習非絶類離倫以為高則以希世取寵而安於卑於是經學始若無用於天下近年以來科舉未興學者但知臨晉帖誦晚唐詩筆迹聲氣稍似之哆然以士自名漫不知經學為何事淀新安晚出於道未有通曉然自我明經翁以來十四世矣經學之晦也不能不朝夕以為憂輒不自量創書院扁曰明經三年始底于成告于有司又三年始從所請延明師膳養講肄日以為常遠近來者如歸踰年科舉詔下新班第一場明經題書院是扁若逆知天意而為之者天相斯文其在兹乎然非大手筆記恐無以詔方來傳永遠也仰惟先生道高而器𢎞經明而文古監學坐臯比天下士皆想慕其風采及幡然而來又莫不欽仰其德義易講所傳僅一二如明闔闢往來如神物分合之妙明經如此真可謂明經也記我明經微先生其誰歸欲望師慈特揮名筆發六經全體大用之妙俾學士有所覺悟一掃舊習可以繼絶學可以開太平經遂不為無用於天下其所關豈淺淺哉創造緣由並族父炳文上梁文謹用拜呈侑書以幣深虞輶瀆惟師慈其采納焉與草廬吳先生書某年月日新安後學胡炳文謹齊沐奉書于司業草廬先生閣下嘗謂天地間無非道六經之文所以載道者也必有人為之宗主然後斯道始有所託而明經之學傳焉自濂洛關閩以來鮮其人矣仰惟閣下襟懷風清而月白度量春育而海涵以作人才明經學為第一義惟兹書院之設淀效其力炳文效其謀辛勤十餘年乃成成亦既十餘年矣不幸淀已死臨絶以此事為囑其志蓋可尚而亦深可悲也其規則田三之二為春秋丁祭山長俸給三之一開義學蓋恐山長未必皆能兼訓導姑徇其名以期永久而義學則敦其實也淀之弟澄所捐田五十畝專開小學以訓鄉族子弟大學則生徒不拘遠近行供不拘員數炳文迂踈無似自創造以來有厚幣來聘者不往家事叢脞不問道一山長任滿幾十年不調每嵗正月之首人事往還數日十二月之尾有事于先大率三百六旬暇不過十餘日孜孜矻矻相與講求經學旦夕不輟寒暑不渝惟四五月間腳氣間發亦力病不敢怠忘實以學者多自遠來炳文不如是懼或廢弛有負死生先聖先師臨之在上炳文不如是懼或如他學院苔緑滋深而芹香莫采有負先聖先師又不特如是也平日所以讀書懼或遺忘思之思之或夜分不能寐嘗為易啓蒙通義又嘗集諸家易解有合本義者為通釋又嘗為六爻反對論及二體相易論凡六十篇皆已成書又嘗以四書纂疏及集成所紀或失之泛或失之舛不自量為㑹其同而辨其異名曰四書通㫖長文未脫藁更一年當可就也以上諸書必將來經閣下訂定然後敢以示人如蔡氏書傳當時不有子朱子後世安知有蔡氏哉本義通釋則郭文卿守浮梁時為刋其半出之太早炳文今悔之無及也刋本今以呈似中有繆戾閣下削之繩之幸甚幸甚是書嘗蒙薦剡奬許備極謂炳文能沉潛往聖之書能發揮先儒之論炳文用是愈加鞭䇿惟懼不能沉潛惟懼無所發揮以負知已又謂後學裹糧而受業者甚衆莫不溫厚典雅而知其為炳文之弟子用是諸生愈砥礪惟懼其或不溫厚或不典雅以負知己獨念柳子厚云人生少有六七十者炳文今七十矣知復有幾寒暑在人間百念灰冷一無所求惟了書院一事死可無恨不然成于今或毁于後後之人必怨炳文詈炳文曰炳文之於閣下辱知之深愛之厚如此閣下之學非記誦詞章之學而本於經者如此閣下之政非簿書期會之政而本於教者如此其所以為教又皆本於經如此當時可言不一言而書院乃今至於如此炳文之罪將奚以自贖哉此炳文之所深懼而深有望於閣下者也緣淀之家自執民役非有規避炳文老而喜學又自喜以教人皆非有所為而為之也蓋謂之明經而有所為為之非真能明經者矣倘俾自今以往書院成緒不致曠墜諸生書聲不致泯歇循明經之名責明經之實他日安知無明體適用者出焉安知其無能繼絶學開太平者出焉學惟明經則有本有本則用無窮是閣下之有德於學者無窮也炳文齊沐而後拜此其事核其辭信其情真其皈依拳切惟閣下念之念之再拜與紫巖汪先生宗臣書一炳文頓首拜覆紫巖老先生尊右炳文之生也後老先生二十嵗自少至長得侍尊誨為最密壯以後去侍側為稍踈至老益踈矣每朋友往還輒詢尊履知起居康勝知山中自教子孫詩書之味甚適道德之趣甚長私心甚以為慰然則迹雖踈而心固未嘗踈也所恨者十數年來老成凋謝斯文碩果如老先生者不一二人而不得以時造請殫五十年心力四書周易等書雖不過發明朱子之說不能就正有道此為大不滿耳老先生年將百嵗而有七十嵗之子五十歲之孫曾孫年近三十且又見𤣥孫書聲滿家彩衣五世祖見孫而及見孫之孫孫養祖而逮養祖之祖端為吾新安盛事如炳文者年將八十詩書未嘗頃刻釋手自笑頭如雪而讀書之眼猶如月也吾二老者何時一小集相與劇談别後欲言者今年姪孫存得館門牆炳文喜甚歸得尊翰又喜甚書中言及新安後續志炳文實不與聞已未年太守朱自齊相聘至郡洪濳夫為此事已成炳文不復有所為尊製文公贊之類及老先生疇昔踐履皆當書入為已之學素不求人知以致遺逸為可恨然此書可恨者不特此也姪孫存稍可教倘以炳文故造就之幸甚幸甚二炳文伏拜尊翰於積仰中感喜可知也示教史評尤仞不鄙此去晝長專當詳玩然後一一拜答不然則恐如文公先生所謂非用某許多工夫亦看某底不出以是不敢自欺亦不敢輒以欺百嵗之老儒也姪孫每歸必道老先生奬借訓誘之意極感極感其再歸也能復賜教一二尤幸尤幸前者未能細密拜讀而又有所請似乎不情然炳文好學之心實是不倦惟老先生其俯教之炳文臨楮不勝拳拳即辰春氣方深伏干為斯文自夀不備三前月十八日令孫惠訪袖示尊墨披誦再三愛我教我之意薰然於言辭之表欣感可知令孫粹然如玉綽有祖風亹亹談論令人聽之忘倦於是益歉炳文豚犬之不肖耳惟是之日炳文不在明經比炳文歸也令孫已回綵侍以故不及拜答炳文過矣中間一一處皆不能滿我之意炳文又過矣叢是二者而誅之將何辭所恃者大度有容交情有舊照以心必不坐以罪兹恃尊愛僭有申覆令孫留敝曲時常與舍姪玉山云先生寓處有兩館端可圖也炳文聞之甚喜於是遣兩姪孫詣下求推轂之賜姪孫一名宗學字季行一名申字子成皆性純而敏屢年館于外區區欲其朝夕得侍典刑發明四書當月異而歲不同以是故拳拳焉惟先生其進而造之炳文幸甚幸甚何時㑹晤得既所欲尤幸尤幸燈下拜此言不能盡乍寒伏祈為斯文自夀不備與古逸汪先生炎昶書炳文一别三十秋每有還往者輒詢起居何如有謁侍下者必囑其道炳文拳拳瞻遡之意蓋以年來老成凋謝時文愈盛而古學寖衰能如執事沈浸醲郁於文公之學者百無一二其欲一見以剖胸中之積疑以發言外之妙趣事不可得姪孫歸自館中乃承書教其為感喜當何如也其再歸時執事所注四書倘不鄙肯示教一二尤幸臨楮不勝拳切之至炳文年雖耄讀書之眼尚能認細字問學晨昏不廢每清晨必焚香告天曰稽首蒼旻一日苟存願存一日好心願為一日好人區區以為老境愈當修謹才頃刻放失便非人矣近日於太極圖說通書西銘等工夫方就匆匆未能寫出求是正尚俟他日即辰春意方濃伏冀珍嗇為斯文自夀不備答敬存胡先生初翁書炳文前月族姪玉湖來承書教感喜交并浮梁䇿問必出吳可堂之手十年前郭文卿為守時曾相聘至彼可堂謂左揲掛一右亦掛一炳文答之曰如此則不是象二自是象四矣可堂堅守其說不肯改其僻也如此無奈之何置之勿言可也炳文今兹之來深悔不如閣下不出山之為高精神敝於應酬殊為無益南山墓銘䝉見示尤感其子之孝如此殊可敬也冗中勉為闕詩姑以塞來意不能發幽光萬分一此間除山村外以詩鳴者少他方有名公到此當為求之戴兄索還甚急不能詳述𠂻曲且此申覆餘容嗣既新寒伏乞為斯文自夀不備繳銘文還查丈書荐厪書教足見昆仲拳拳然有不忍死其親之心勉強遵依但其中用意處亦有不可不知者當略道之一則炳文於府尊既有睢中之契於梅趣翁既稱之曰先生則於府尊只合稱字如昌黎之於李元賔是也蓋如此乃見親密之意稱君者同而稱字者元賔所獨也一則意謂查氏自待制公以孝聞天下繼之以諱經者居喪之孝又繼之以梅趣翁之孝至府尊誠有繼志述事之孝所以末結之曰查氏孝善之澤未艾也至若銘文則首八字炳文自以為能盡出叔晦真像第三句從叔晦字上說第四句一嗇字非止謂嗇於財也坡仙自以為平生受用此一字蓋嗇言語嗇報用嗇精神其中自有綽然餘裕者存焉後四句謂其平生受用心針故生也能葆此靈光死也猶如高秋月白乍看者以為太過殊不知炳文之所見梅趣翁與叔晦父子相傳此心視世之曰胡仲虎真知我者價回亟此申覆殊愧草草答定宇陳先生櫟並辭求遺逸詔雨中有客來訪藥香滿袖隨出台緘見示再三復之如親聆藥誨不趐也喜極感極我輩居文公鄉熟文公書自是本分中事今能使舟車所至人力所通者皆家傳而人習斯道一大幸也炳文之喜又當何如豫老矣欲出而應自覺詩書之味長功名之念冷且有負先聖先師臨之在上兼之文體當一變庶可為後學矜式在先生輩恐有不能辭其責者何當胥晤相與細商之也昌黎所謂惟吾崔君一人而已者先生亦未宜多遜承委考評近邀石潭董友來為銓次董名秀實年六十餘舊嘗代入太學請鄉舉吾輩似此不多見也全榜録呈六伯卷中僅取三十有九而先生所發至者已中其四預賞者三姪孫宗學亦復居亞有開必先是足為鄉試之䜟矣近者饒郡王友希旦以二文字來求評炳文各為作一篇謾寫呈似蘭叟回千萬賜以台翰庶慰拳拳齊㑹後自當遣人報捷或者台車不屑一來則又幸幸也天氣清和猶未甚熱不知執事者以為如何炳文腳氣發作拜字殊覺不謹胸中欲言何限不能吐萬分一春季闕呈未間乞倍加珍嗇以需魁擢不備韓昌黎與崔羣書有云至於心所仰服考之言行而無瑕尤窺之閫奧而不見畛域明白純粹輝光日新者惟吾崔君一人而已二炳文前月半間常奉書相答且再四囑之伯敬母致浮沉今未審已徹尊覽否惟是一時草率深虞不謹老先生恕之可也兹因族家遣人取齊心聞之已更深矣老眼燈前愈覺昏花拜此彌覺潦草然有此的便坐失之又不可所以前書請教切干一一批示求借老先生所著四書就付齊心以來尤幸尤幸或簡帙重大權且教以庸學亦可緣炳文僭越為通㫖一書必欲得老先生者附于諸家之列切乞勿外炳文不得以時參請是自棄也幸而族家託眷名閥往還不乏尚干因風賜教有以鞭其不逮是所願望或者台車不賜鄙斥惠然為諸生一來尤所願也臨楮不勝拳切時菊將開伏干為晚節自重不備九月初四燈下炳文頓首再拜三求考評試卷炳文頓首再拜定宇先生尊右伏自體仁堂相與問答後不貢起居問者餘兩載暨明經小試乃沐書教留之几格每一展玩如坐春風中喜可知也此試應者甚衆司評實難其人蓋能明一經者有之兼明經者甚不多見士林公論皆以為未有如老先生者庸是玉湖總管特令拜此申懇切干留聽蒙所發二十餘卷若有可魁不必嫌疑初應舉子未有非之者况此小試不過觀諸生之優劣有何疑焉如必以此為嫌乞存此二十餘卷炳文自當銓次以附于先生所評之中卷子見此發去便乞過目仲春闕玉湖自得專緘以請以謝其詳託賔暘面禀切干勿外未間伏丐為斯文珍重不備四炳文乃者草草上狀深虞不謹先生非惟不督過之且諄勤賜以回翰讀之再四愧感愧感惟是玉湖皈倚之故胡辱峻却如此且先生嘗為醉經題品者再獨不能一為明經示教乎玉湖特特拜書萬告留聽俟考評畢又得拜書以請炳文不勝至禱外去歲賔暘之來僭以通釋為餽不知過沐賜之尊覽炳文思之有二罪先是不能上求是正而遽爾公傳過之一也及賔暘回侍時不及拜書請教二也宇宙間未有之竒書斯言謂之戲之則可耳不敢當不敢當缺二板當俟後便印去其所望於老先生者或一字之謬或一語之愆悉望指示一語聞則一病瘳炳文非護疾忌醫者楮有限伏乞尊悉不備五炳文伏自初夏辱尊翰念欲奉書以報乏便未果賔暘來甚喜謂此便最的暨其歸也又莫知之以故凡欲言者鬱鬱不得吐然而尊仰即不昕夕間也此月荐承教墨謹書逐一拜復于左一承問曰本義乾九二剛健中正莫是剛健得中誤筆作中正如何炳文答曰凡言九五剛健中正六二柔順中正易之正例也乾九二剛健中正變例也程子曰中重於正正有不中中無不正本義蓋取諸此然又非特程子意也爻之為九二者凡三十有二乾九二其始也未濟九二其終也未濟云云非正也夫子曰中以行正况乾六爻皆言聖人事九二龍德正中本義以剛健中正許之恐非誤也尊見以為非是乞批教一承問曰九三爻下云云炳文答曰按本義云九陽爻三陽位重剛不中居下之上乃危地也此全是解厲之一字蓋以三之地位言其有厲之象也乾本是剛之純健之至九三居上下乾之間又以剛居剛性體剛健所以有乾乾而惕之象也三之性體如此而其地又如此故有乾乾之象有惕之象有厲之象本義於文只得總此三句而言之於厲有絶句正自不相關也尊見以為是否乞批教一炳文生後於先生一年體力倦甚兼有足疾尊翰所謂聞道之不深信道之不篤者政為炳文發僭越作本義通釋外嘗為啓蒙通釋義又嘗為六爻反對論及二體相易論凡五十八篇并序六十篇但未得求正於有道常以為恨年來老成凋謝異郡有葵初異縣有先生不得以時參請如之何如之何外又見四書纂疏及集成多又差繆於是自為一書名之曰四書通旨較之集成又添得數家恨不得先生發明編入一家倘有的便示教幸幸如沐不外且乞示庸學容以次請領也炳文至祝至祝一明經課文凡自藻鑒揭曉後遠朋競來觀録莫不唶唶然嘆曰年將七十而所評諸卷自首迄尾蠅頭細字批過何其眼力之老而明如此也是是非非無一字差前前後後無一卷舛何其心力之精且健如此也使鄉試㑹試有考官如此何患無竒才者出邪公論如此非炳文一人之私此等處政自用謏之一字不得炳文不敢也一預賞姓名經疑第一吳性初鄉間羅田人胡敬存高弟亦嘗從遊于炳文第二胡德宏炳文姪孫也向者所取醉經兩次魁選即其人第三王鶚仲儀之子也第四五六陳子文金復初朱升第七胡仁夀炳文曾姪孫第八程興賢第九孫祖皆鄉間人第十王伯翥德興人第十一俞誾此却饒州老儒王葵初之筆去年饒有課試卷子極多炳文司評此先生書易居魁亞其人可知矣今先生批其一問云所見端的與區區寫注疏者不同二問云非有所見不能合二章而一之於是知炳文所見與先生略同私自以為喜王希旦名葵初饒州德興人易學摘編一經義前四名皆從遊于明經者一易二書皆王祖錫雙溪七世孫三禮記胡仁夀即醉經所取記魁者即今所取經疑第七而賦第三者四胡德宏詩即今經疑第二者五金復初春秋六張國瑞易明經人七金升祖八葉大有九陳野十俞叔廣即炳文前所謂王葵初之作也一賦吳性初又第一夏德廣第二葵初之友胡伯靜第三伯靜仁夀之字也四李明通德興人五朱斌生浮田人餘不能盡録一賞惟通釋未有紙可印今玉湖已買得紙矣不數日間送去一仙鄉所發卷子炳文恐尊見以為疑故有撥出此數卷之說今考評至公至明有何可議者詳觀陳子文及朱兄經疑雖置魁亦可也前在郡庠得觀朱兄之文懼其失之太多今能簡淨如此可喜可喜有王某者云此兄欲來訪果然尤幸尤幸一所取真如稱上稱過銖兩不差但經疑第一中有二句云曰時者自艮卦時止時行得之曰權者自巽以行權得之炳文未免僭越為除去此二句蓋謂權者孟子意自夫子而得之可也若時中與時止時行皆夫子意雖是小疵要必去方為無瑕之玉况此篇無此二句文意正自足未審尊見以為如何乞報下為幸一秋高氣清倘蒙先生不賜外鄙特與降臨書院炳文當深衣率諸生立館下以聽文公玉山之講以聽象山白鹿之講亦斯文一大幸也玉湖之意於先生甚拳拳特令炳文拜此以請惟先生惠然肯來幸甚幸甚炳文下情不勝顒俟之至一炳文每得尊墨愧汗如洗炳文拜答此書欲謹而率蓋體倦不覺其字之欹斜眼花不覺其字之大而潦草惟先生矜而恕之則可不然責之炳文將何辭炳文臨楮不勝至懇一尊墨已呈之玉湖仲儀皆同此附起居敬明經諸生見炳文作此書有望先生俯臨之意皆預為欣躍惟先生惠然幸甚幸甚涼意方新伏望為斯文自夀并干尊照不備八月十三日炳文頓首拜覆論二十四氣論或問厯二十四氣之說豫曰是言氣之行有序也而莫不有理存焉俗有相承誤讀者榖雨如雨我公田之雨蓋以此時播種自上而下也今讀為上聲非矣芒種二字見周禮種之隴反芒當音亡謂種之有芒者麥也今讀芒為忙種去聲非矣處暑如既雨既處之處處止也謂暑氣將於此時止也今讀作去聲非矣每月有節氣有中氣如丑之終寅之始則為節寅之半則為中一年四立即是四時節氣二分二至即是四時中氣九十日之氣往者過而來者續故謂之立九十日之半故謂之分夏冬不曰分而曰至至有二義子至已六陽午至亥六隂至者介乎已午亥子之間也冬至亥隂極故曰至子陽於此生亦曰至夏至已陽極故曰至午隂於此生亦曰至日影短至長至亦然且以上半年論之立春正月節雨水正月中漢律厯志驚蟄在正月中注今作雨水蓋自秋分水始涸立冬水始冰冬至水泉動大寒水澤腹堅今曰雨水者先是為露為霜雪皆是水氣凝結以至於寒之極春則水氣流行而又為暑之始也况天一生水物之生皆始於水春屬木木生於水今厯立春後繼以雨水宜也卦氣正月為泰天氣下降當為雨水二月大壯雷在天上當為驚蟄今厯先雨水而後驚蟄亦宜也按國語四時有八風厯獨指清明風為三月節此風屬巽故也驚蟄者萬物出乎震震為雷也清明者萬物齊乎巽巽為風也巽曰潔齊故曰巽風曰清明清明有潔之義律厯亦有明潔之義榖雨三月中自雨水後土膏脉動今又雨其榖於水也周禮稻人掌稼下地注謂以水澤之地種榖即榖雨之謂也漢律厯志榖雨注今作清明以今觀之榖雨似遲半月蓋風土有不同人力有遲速必至此然後無不種之榖也四月中小滿先儒云小雪後陽一日生一分積三十日陽生三十分而成一畫故為冬至小滿後隂生亦然夫四月乾之初謂之滿者姤初羸豕蹢躅坤初履霜堅冰羸喻其小蹢躅喻其滿霜喻其小堅冰喻其滿易言於一隂既生之後厯言於一隂方萌之初慮之深防之豫也小雪有大雪此但有小滿無大滿意可知矣至若三月中榖雨五月中芒種此二氣但指榖麥言者處暑農乃登榖此曰榖雨農家方種榖冀今年之秋也榖必原其生之始者榖種於春得木之氣成於秋金克木也麥必要其成之終者麥種於秋得金之氣成於夏火克金也木氣柔故榖頴垂金氣剛故麥頴昻此隂陽自然之理也無榖民何以仰食無麥民何以續食春秋大無麥禾則書之此也六月節小暑六月中大暑不知者以為夏至後暑已盛不當又謂之小殊不知易曰寒往則暑來暑往則寒來寒暑相推而歲成焉通上半年皆可謂暑通下半年皆可謂寒正月暑之始六月暑之終七月寒之始十二月寒之終而曰小暑大暑者不過上半年氣候之詞也隂陽沖和之氣不頓息大暑非驟至於大也由小而馴至於大也六月中暑之極故為大然則未至於極則猶為小也小大二字最可見造化消息進退之理矣復以下半年論之七月中曰處暑即如豳風首七月暑之終寒之始大火西流暑氣於此乎處也觀處暑二字便自有豳風七月意思八月中白露九月節寒露秋屬金金色白白者露之色寒者露之氣色先白而氣始寒寒固有漸也九月中霜降露寒始結為霜也立冬後曰小雪大雪寒氣始於露中於霜終於雪霜之前為露露由白而後寒霜之後為雪雪由小而至大皆有漸也至曰小寒大寒亦猶豳風一之日觱發二之日栗烈觱發風寒故十一月之餘為小寒栗烈氣寒故十二月之終為大寒豳土寒早故寒氣先要之此不過總結下半年之氣候爾合而言之上半年主生曰雨曰雷曰風皆生之氣下半年主成曰露曰霜曰雪皆成之氣下半年言天時不言農言農莫急春夏也先儒言變者化之漸化者變之成立春雨水後寒氣漸變至立夏則寒盡化為暑矣然曰小暑大暑其化也固有漸焉立秋處暑後暑氣漸變至立冬則暑盡化為寒矣然曰小寒大寒其化也亦有漸焉易曰知變化之道其知神之所為乎觀二十四氣可見矣大學格物致知為第一義此亦格物致知之一端然不特此也調元氣化玉燭者知之參贊燮理豈無小補云雲峯集卷一
