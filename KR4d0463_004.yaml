body:
  text: 雲峯集卷四元胡炳文撰題跋跋文公先生墨迹昔有度正者慕周程之學討求二先生遺墨僅得伊川手刺一幅首尾十有九字終身寶之特求文公先生為之跋吾友操希元得文公帖凡一千一百八十七字視度正所得不既多矣哉豫嘗觀羲獻帖可想見其風䪨觀顔魯公帖可想見其氣節若夫我文公先生帖知其反覆辨明處非惟可發人理義之心點闕有道德之味存焉吾鄉所得多是與程允夫董闕程正思此三帖皆與程正思正思有性理字訓文公嘗以為小爾雅於此亦可想見其為人也希元寶之寶之跋李生所藏坡帖此帖坡筆無疑坡所書太宗殺弟事可疑信有之坡能書范鑑朱子綱目不書何也殺之不仁殺之而無補於丑口之興不智雖然坡之書固自可寶子常其寶之丑口乃唐字也題戴德夫五運六氣之圖易八重卦皆不言兩惟離火曰明兩作離先儒以為醫經君火相火合六脈必分君相火始見自下生上五行之相生者與河圗合以左克右五行之相克者與洛書合庸醫例以兩腎脈屬水則失所謂君火在上而無為相火在下而用事與夫五行生克體用雖見於六甲而不見於六脈人病標本於何察哉德夫之為斯圖也六十年氣運瞭然在目司天司泉休咎可運諸掌凡醫者得之皆可以脈三因而效十全神矣哉德夫之術也仁矣哉德夫之心也題徐芝石賦陳伯孚飛白如塵縷逰絲如秋蟬春蝶芝石所云可以形容伯孚之字如美玉在山如懸石萬仞伯孚所云亦可以形容芝石之賦詞如其翰翰如其詞一旦得覩此二妙豈非大竒事然吾聞二君所學自有詞翰之外者即今至前梅開先天枝上吾三人者安得相與共探無極之真邪題李伯時洛神圖洛神賦有楚騷求宓妃湘君遺意騷云貫薛荔之落蕊落蕊細初蕊尤細貫之良難此畫毫端入細難也洛神風情逸韻寫在筆外尤難也跋新安後續志新安後續志總管朱侯屬郡士洪潛夫為之也侯下車以修學宫作人才為第一義越三年政行化孚百廢具舉始為茲志成前續二志本皆不存侯并今志刋于學侯愛新安之民甚厚故欲知新安之事甚悉知其事愈悉則愛其民愈厚然侯非特欲自知而已也書沿革則知昔人興廢之由書戶口則知今日版圖之富書山川則知扶輿清淑之攸鍾書貢賦則知上下征輸之有制以至橋道館廨寺觀社廟凡有關於民者皆欲悉之以次書其中如風俗學校人物非惟書之詳侯意於此尤拳拳焉蓋謂此文公父母邦方今文治聿興極地所載咸知宗文公之學此則雲之泰山河之崑崙而魯之洙泗也後之為新安者而知此必能厚其民為新安之民而知此愈當自厚然則侯之此志不徒作矣侯名霽字景春公廉寬靜歷數大郡治行皆稱最潛夫名焱祖新三衢郡文學托遺事寄微言勤且精矣延祐己未郡人胡炳文跋字説伯善字説明經十三世孫成章之孫性美而嗜學名元字伯善豫訓之曰論語善人之上有君子有聖人孟子善人之上有信有美有大有聖有神豫與爾祖爾父所望于爾者非止為善人而已也况爾之名曰元而字曰伯善自元而言善大善也純粹至善也易卦之占亨多元亨少爻之占吉多元吉少元亨大善而亨元吉大善而吉也人之行事善百一大善千一故以元為貴然兹事也請論心坤初善不善皆自念慮之微積之復初有不善必自念慮之微知之自此至微處充之即是此善之至大處蓋有一毫之不善非元也有一息之不善非元也然兹心也請論性命命於天為元性於人為仁四德皆天命之至善而夫子以元為善之長四端皆人性之至善而程子以仁為天下公善之本本善者性為善者心盡心知性以知天是為明善存心養性以事天是為止至善明善則於此元知之深止至善則於此元踐之熟爾其思之勉之哉况吾家自明經翁以來善慶之源方深詩書之味益永故豫望於爾者不但為一鄉之善而欲為天下之善不但為坤初六之積善而欲為乾九二之善世也爾其思之勉之哉可權字説甲道王與立字可權問其説於豫豫曰文王九卦之次末乃及巽以行權夫子六經之次末乃作春秋春秋聖人之權書權聖人之大用故學者有可與立而未可與權者然亦未有不能立而遽可與語權者權以應事之變立為律已之常易卦於乾言立誠不言權坤言敬義立不言權恆言立不易方不言權蓋易三百八十四爻只是一時字能隨時以取中即是此一權字卦言立不言權權固伏於三百八十四爻之中而不露爾學者能卓爾有立至於義精仁熟凡事理精粗曲折處自然無不相入殆如風之入物有不見其迹者是之謂巽以行權可權勉之苟平日無自立之志無特立之行而遽欲言權必流之而為權術權變之權非聖人所謂權也可權戒之公羊子言權者反於經而後有善韓康伯謂反經合道為權程夫子謂權只是經朱夫子謂經自經權自權是數者不同可權辨之貴和字説鳯山汪君清宇之子名箎字貴和來求字説豫告之曰子之字蓋取諸禮之用和為貴也禮本體中有自然之和所貴者用之和不失其體之中爾貴和曰如是説則於箎之名若不相關焉豫曰箎樂器也於八音為竹於四時為春分於釋文為嬰兒啼聲四氣莫和於春然惟春分為最和五方之人聲音無有同者惟嬰兒不異蓋兒啼聲中自有至和妙焉過是則不同矣大抵春分之後氣過乎中嬰兒之長性移於習故欲葆其和之粹者不可不養之深欲節其和之流者不可不守之固養之深則不移於習而此和常如嬰兒時守之固則不過乎中而此和常如春分時如是則心和氣和播而為聲之和達而為家國天下之和貴和之義大矣哉雖然此即吾前所謂用之和而不失其體之中者也貴和勉之謙亨字説程生名善勝蓋取道德經中語也天道不爭而善勝即吾易所謂天道下濟而光明也不爭便是天之謙善勝便是天之亨遂以謙亨字之蓋天非特以謙而亨虧盈益謙是凡人與物能謙者天皆亨之也易三百八十四爻有吉有凶有利有不利惟謙下三爻皆吉上三爻皆利他卦無有及之者若夫幼而不孫弟則自幼已墮於不謙所行已陷於凶且無攸利矣可不戒哉善勝方在小學豫遽以是訓之者文公先生感興詩第十八篇專為蒙學而設其首曰童蒙貴養正孫弟乃其方即易之所謂謙也其中言進趨極虔恭進而謙也退息常端莊退而謙也庸言戒粗誕時行必安詳一言一動皆貴乎謙也末曰十五志于學及時起髙翔即謙之亨矣善勝年將十五謙卦於易之次亦為十五故以謙亨字之而且為之説云朱文德字説文公五世孫名勳字文德以至治癸亥歸婺源省墓墓自連桐府君以下凡為他人所有者必欲復之乃已且來明經求字説豫曰書五十八篇開卷便有勳字有文字有此德故有此文有此文故有此勳人皆可為堯舜而况我文公之孫哉姑以論語集注中所謂文與德者言之文字訓釋不同或曰詩書六藝或曰禮樂制度或曰威儀文辭或以為德之見者或以為道之顯者文子之諡一也或以為勤學好問或以為錫民爵位德字訓釋屢改乃定始曰行道而有得於身繼曰行道而有得於心末曰得於心而不失此語有兩意一謂得之有生之初不可失之於有生之後一謂得之昨日者不可失之今日也文德能以家學反之於身知爾祖釋德字之意則知爾祖釋文字之意矣爾祖論此德字嘗以手中執扇為喻曰須用不失字訓如得人此扇可謂得矣才失之則非得也豫試以文德今日之事為喻可乎鬱鬱松楸前人得之今人不失之今人得之後人慎不可復失之文德曰然故書此以與之汪季修字説友人汪維德豫從兄之甥也從學甚勤豫甚喜之故字之曰季修且為發修字之説以教焉屋修則不敝井修則不汚器修則不壞大學之目有八修身居其中文王之德有九亦曰德之修格致以啓其修之端誠正以踐其修之實齊治平以極其修之效曰自明曰自慊曰母自欺皆以自修也自則用力在我不在人維德勉乎哉文王九德皆反身自修之事獨於損曰德之修者有一毫粗厲之氣不可謂之修有一點私欲之心不可謂之修故忿易發如山懲忿當如摧山欲易遊如水窒欲當如止水大學正心章恐人心之不得其正者有四而以忿懥為先懥者忿之留也修身章恐人心之偏於所向者有五而以親愛為先愛者欲之深也通書曰君子終日乾乾不息於誠然必窒欲懲忿而後至易於乾曰修業曰修辭而末曰損德之修其旨深哉蓋必有損也然後有修心損其所當損也然後能修其所當修不然朱夫子何以又曰修者治而去之之謂也維德再拜曰敢不如先生所以教於是書以與之伯裕字説武林儒醫徐君名益字伯裕蓋取易九卦所謂益德之裕也風雷益君子以見善則遷有過則改德之裕其在兹乎今夫風烈則雷益迅雷迅則風益烈風雷相益而物受風雷之益者其生自裕君子遷善如雷之決則過益寡改過如風之速則善益增遷善改過相為益而其德自裕譬之一身衛其生者日益嚴葆其神者日益固內外相益而元氣沖融其生有不期裕而自裕者徐君業儒而醫之術益精為醫而儒之道益行儒與醫相益以故能裕人之生而亦能自裕其德蓋自其先君子開博雅堂市藥四逺如歸貧者不取直故有以垂裕于後人而伯裕存心益厚律已益謙故其醫之行也益𢎞活人益衆而其德益裕益者不已裕者不窮益者有加於前裕者可充於後伯裕其益勉之哉吳守中字説中未易言也毫釐之差則過之須臾之忽則失之中庸以為賢知者過愚不肖者不及論語謂師也過商也不及則雖賢者知者又自有過有不及中豈易言哉堯舜禹執中湯亦執中朱子四書於堯之執中不訓曰守於湯執中則曰守而不失中無定體隨時而在若之何而守之亦曰敬而已矣朱子於堯之執中不訓曰守於舜之惟一則曰守其本心之正而不離然則守其本心之正者即所以守此中非敬之外能有所謂守之道也特堯之欽明文思安安不見其守之之迹湯之聖敬日躋則不免資於守之之功爾吳正字守中求豫字説豫特發敬之一字訓之須臾毫釐之間稍有不敬此中即失於須臾毫釐矣戒哉戒哉養浩字説汪養浩五世祖諱克剛字叔全宋進士及第初授黃州教末為饒郡通判卒於官號存養翁養浩名存義其字其名率乃祖也率其名踐其實為人祖宗者何幸有此曾玄哉蓋浩然之氣充塞天地間本無一毫虧欠本無一息間斷人稟之以有生天地之氣即吾氣程子曰天人一也更不分别然則自存養翁至于養浩祖孫一也所謂浩然之氣豈有分别哉且養浩莫先於集義集義即所謂積善存養翁以積善之慶遺後人後人積之不已念念善而無一息之不善事事善而無一毫之不善庶乎浩然盛大流行可無負天地祖宗之所與我者爾存養翁所取於孟子者存其心養其性養浩所取於孟子者集義養浩二説未嘗異而未嘗不異養浩深思而力行率其名踐其實當不特可取科第可復青氊而已養浩勉之勉之全仲字説建安余贇勿齋熊公字之曰全仲贇從文從武蓋以文武全才期之也贇通作彬以為文質彬彬質為體文為用以為贇則文為體武為用皆得體用之全故曰全仲然古人曰全體大用所謂全者在體不在用才者德之用也所當全者在德不在才人恆曰三光五嶽之氣分而世所值無全才豫獨曰二氣五行之理合而人所稟有全德但全付所有者在天知其性之所有而全之在人故朱子以仁為心之全德又曰非全體而不息者不足以當之是故格物致知使所知者無偏而不全之處誠意正心修身以至於齊家治國平天下貫身心合內外而所行者無有不全焉知之全行亦全是為德之全而匪徒才之全豈不足為天地間全人哉豫欲發勿齋言外之意故為之説李孟善字説李生慶元請曰慶元未有字惟先生字之豫謂慶繇善積元乃善長字之曰孟善慶元問曰易他卦不言善獨言於乾坤者何豫曰易凡言吉凶悔吝無非教人為善善則吉大善則元吉不善而悔則凶亦吉首於乾坤發之例其餘也陽純而隂雜故乾言善坤言善不善又問坤言積善之慶者何曰坤隂卦也莫見乎隱莫顯乎微微與隱皆屬乎隂慎獨之學當審其幾間居不敢一不善之為念慮不敢一不善之萌是之謂積履上九曰視履考祥其旋元吉祥者慶之兆旋者慶之周至是無一念一事不善故坤曰有慶履曰大有慶慶元又問曰乾元為善之長者何曰四德皆善元為之長四時之春四端之仁皆元也然繼之者善不見於元而乃見於貞貞下起元是故一元起于貞萬善起於元慶元曰善之義至矣盡矣豫曰未也坤言積善之家以其善一身者善一家也乾言善世以其善一家者善一世也慶元請曰即此為孟善字説可乎豫曰可遂書此以勉之節夫字説吾宗孟成連年館歙其友生洪彬字節夫蓋以過於質則無文過於文則滅質節其過然後彬彬然可為君子也書曰節性性之過者不節則不中中庸曰中節情之過者不節則不和不和則不中如一年二十四氣有中有節節者抑其過而歸之中也天地之數極於六十故易六十卦為節兊下坎上坎水之來無窮兊澤之容有限限而止之始得其中其外爻象言節者凡四皆擬坎離言蹇九五坎中故曰以中節家人九三離剛不中故曰失家節鼎上九離剛能柔故曰剛柔節未濟水本潤下而坎又在下火本炎上而離又在上上九上卦之上也故曰不知節學者知坎水離火之不可無節則知質與文之所以為彬彬者矣彬一作贇從文從武文與武之可相資而不可相勝者亦猶是也大抵易貴乎中中由於節故三百八十四爻之象獨以節之一字終焉者以易始於乾終於未濟皆欲人得中所以皆欲人知節而未濟上九之所謂節即乾元用九之所謂天則也豈有能見天則而不知節者哉節以求合乎中天則吾天然自有之中也孟成將授吾易於節夫故豫為發易之所謂節者為之説以勉焉雲峯集卷四
