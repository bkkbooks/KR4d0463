body:
  text: 雲峯集卷五元胡炳文撰碑彭王廟碑婺源郡西七十里曰霍口大溪自張公山來旁一𣲖自三靈山來兩溪合處一山雄聳彭王廟在焉王諱畬霍口人唐末黃巢亂率兄弟扞蔽鄉邑死之桂巖思溪髙砂諸處立廟此其降神處也凡禱水旱疾疫如響鄉民屢以非道呪咀者神即殛之死宋開慶己未重慶受圍兵交空中見大旗曰婺源彭王圍遂解帥李遇龍上其功于朝加封夫以王之英烈生而為邑人排賊患死而為國家靖兵凶且自江至蜀凡萬里光靈遠揚惠愛旁孚其勳德固宜與祀典為無窮也廟未有記鄉之父老陳惠陳穰礱石求豫記其事遂為作迎享送神詩俾祀而歌之詩曰雙溪合兮溶溶廟孤峙兮東峯水秀兮山雄據異氣兮神所鍾丑口微兮賊刃紅張義膽兮戕其躬飛精英兮蠶叢搴大旗兮雲中月暈拆兮息羣凶曰光懸兮照孤忠役潛蛟兮年無凶驅厲鬼兮翺祥風神之福兮龎以鴻神之祀兮宜無窮泰定丙寅正月望郡人胡炳文記并書墓志故廣西兩江道宣慰使司都元帥府經歷馬君墓志銘君諱良字良甫世家髙唐幼在羣兒中倜儻有偉氣人異之長通吏事一日奮然曰儒不吏則迂吏不儒則俗吾肯為俗吏哉於是益從鄉先生學旁參博覽自經史以至人情急世之要靡不通究初為賔州路知事以亷能著雍州夙號難治君為經歷處事有條次潔已御吏平日以猾聞者不敢喘為廣西兩江道宣慰使司都元帥府都事在任除經歷悉取諸路利病白于上罷行之有不可必達其志上官及同僚稍不如法輒面爭性剛直不阿以故甚得士民心而居其上者多不懌左右兩江洞鄰交趾負固為民害其地水草毒惡先是官軍死者十八九大德甲辰左江洞寇黃聖訓叛招諭難其人僉曰亷幹彼素信服者惟馬從事可君聞之慨然自任曰唯吾可唐貞觀初嶺南酋長馮盎謀反員外散騎侍郎李公能以一介之使代十萬騎吾獨不能乎即日上馬去冒瘴癘歷巇岨至輒叱之曰方今薄海內外悉臣靡有叛者汝何敢叛汝何敢反且復喻以禍福曰榮汝官樂汝土視爾奔走流離終復身首異處計孰得邪思之思之無悔拜且泣曰公恩主也敢不如命約日來降歸途半固致金二甕君却之唤語其使曰歸語汝主此非吾所欲也地多野味能獲一二寄我乎居無何舁二異獸來君俾致之帥閫烹與上下嘗之當時民謡曰飛吾單騎出公不意微公之勇孰闕其闕却彼闕山禽微公之亷孰服其心未幾右江洞寇岑闕興亦叛元帥唐懷遠受省委招諭領軍餘二千人留田州軍無律大為民擾君為文檄于亷司曰唐元帥於官無鴻毛之益於民有泰山之損本欲禦寇乃為寇也亷司韙其議就以委君君不能辭往如初世興感欷約降與聖訓不異暨二寇來元帥將之入覲掩君之功不以聞人咸為君寃之大德丙午十有一月以病卒于官享年五十三祖忠父全妻宋氏張氏先君卒李氏相繼逝子堅奎壁君卒時壁未晬弟善嘗自髙唐來靖江取兄嫂喪以歸至長沙危涉洞庭湖善先邁僕窘無資以寄嶽陽寺中越十有四載壁始知之哭而言曰嗚呼蒼天吾父母何為至是邪孤不孝罪也徒步二千餘里沿途哭泣行者不忍聞至嶽陽四喪俱在聞者唶唶嘆曰微是子馬公之魄不滯於殊鄉乎今如此天道不彰乎壁將護葬於髙唐求豫銘壁嘗從豫學故知其父行詳且信豫深愛其為人而悲其志遂為銘銘曰自負表表特立矯矯厥材寡雙彼寇徂獷能化其梗用嘉靖于兩江兩江人心德君之深視江流淙淙我銘其闕而章厥慶鴻以龎詹氏孺人墓志銘闕詹氏諱道餘世居武夷髙曾徙崇化里遂為建陽人曽祖諱光宋進士祖諱元父諱僧皆隱德不仕詹氏幼有淑德母黃氏教甚嚴二十有四適同里余仁起仁起幼孤事姑彌謹蚤暮問燠寒痛癢敬搔抑扶持之湯藥必嘗而後進膳具必珍饈凡可求得之者雖遠不憚暨終每節序或風雨霜露泫然悲泣不己生事葬祭鄉鄰咸稱其孝初適豫時家微賴內助不十年田廬日闢凡同鄉之貧乏者借貸盈庭或立契劵不能償詹氏取焚之無何孀居十有五年撫育子若孫處內外皆有條次教以義方不務浮靡家裕復倍於昔時子安定勤儉如其母待鄉鄰以和接朋友以禮人人翕然稱之曰有是母宜有是子也生於宋淳祐辛亥秋八月沒於泰定甲子夏六月享年七十有四仁起諱興先卒子一孫男二贇資女三曽孫男二焕炫女一將以某日葬于某山下構亭曰思庵前事以豫友張存中所敘行實來求銘銘曰生茂族嫓德門孝而惠靜以敦躬勤儉儀子孫亭曰思思如存述壼彞銘兹坌懿厥聲永於聞金氏孺人墓志銘程生霖衰絰詣吾門再拜泣血言曰孤不天禍又延吾母顧惟歙汪氏嚴桂氏信永豐韓氏皆有節孝聞于官旌表其閭彰彰在人耳目孤不克以聞于上使母之闕之孝將泯沒無傳孤罪不容誅先生肯賜之銘闕表莫大焉言訖復涕泣再拜豫哀其志按狀其母金氏諱柔真父諱宜之殁時母方三十安貧守節孀居四十餘年清貞之操表裏始終如一姑年逾八十奉飬一如所欲姑有三子别居迎飬不肯去獨安於嫠婦之家孝可知也臨終指天謂曰汝孝如此願汝子孫之孝如之諸子孤幼辛勤撫育稍長遣事名師而訓敕甚嚴以故皆克樹立嘗病篤其子霖述其行露香禱于天夜夢數羽士至其家病尋愈自是夜香祈母夀康凡十有四年母壽七十有七無疾而逝生于宋淳祐丁未終于至治癸亥將以十二月辛酉祔葬西郊芳村男四人長雲以儒為休寧縣吏先十有八年卒次洪出繼其第三子也幼周孫男十有一人儒弟祖澤興翁崇德夀關敬德寧祖光祖懋德福祖貴德女四人銘曰迹不越閨闈目不閲詩書而節靡渝而孝靡虧慈靡不足而嚴有餘誰能旌之光里閭吾能銘之藏玄墟傳節孝王氏夫人傳王氏名靜婉饒州餘干人生宋寶祐甲寅年十九歸于信之貴溪月巖程先生季子植甫五嵗而植以疾殁且與王訣曰吾父母老不得終飬奈何王泣而對所不畢志以飬舅姑將無以見夫子於地下服闋母氏欲奪其志則又泣曰未亡人執定省禮於舅姑者以夫子之言猶在耳也之死矢靡他越五年舅沒事姑翁氏愈益闕順卧起必偕至元壬午時姑年七十病卧牀蓐一夕羣盜至門擬刃于姑側王以身翼蔽願代姑死盜義之而兩釋焉他日姑病革語王曰汝事我無違禮願汝子婦以汝事我者事汝吾死瞑目矣先是有以理數言禍福者姑以王命叩之則曰二十而嫁嫁五年而嫠又十年而死舅姑相視嘆曰節孝婦也如命何逮今舅姑沒三紀而王夀且康子婦諸孫事之惟謹人以為節孝之報云讃曰王氏凛然德貞烈丈夫所不能為斯亦異矣至其事姑則猶如處女事母時節與孝人不間于舅姑之言雖衛共薑陳孝婦何以加諸上之人表彰之可以美教化移風俗矣雲峯集卷五
